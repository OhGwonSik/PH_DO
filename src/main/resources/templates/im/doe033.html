				{ title: '[[#{grid.lmodate}]]', dataType: 'string', dataIndx: 'lmodate', editable: false },
				{ title: '[[#{grid.lmotime}]]', dataType: 'string', dataIndx: 'lmotime', editable: false },
				{ title: '[[#{grid.updtchk}]]', dataType: 'integer', dataIndx: 'updtchk', editable: false } // wtakit용
			]

			const doe033ItemGrid = new GridUtil(doe033ItemGridCM,'[[${tabPage}]]', pageId + 'ItemGrid');
			doe033ItemGrid.setRowHt(40);

			doe033ItemGrid.setChange(async function(evt, ui){

				if(ui.source === 'edit'){
					let pqRi;
					const newRow = {};
					if(ui.updateList[0].newRow.hasOwnProperty('tolocky')){
						newRow.ullocky = '';

						const countMap = new Map();
						const groupMap = new Map();
						const checkList = this.Checkbox('state').getCheckedNodes();
						[...checkList].sort((a,b)=> a.tolayer - b.tolayer)
							.forEach(row =>{
								const groupKey = row.tolocky + '_' + row.equipky;

								if(!groupMap.has(groupKey)){
									groupMap.set(groupKey,[]);
								}
								groupMap.get(groupKey).push(row);

								const layerCount = (countMap.get(groupKey) || 0) + 1;
								countMap.set(groupKey, layerCount);

								this.updateRow({
									rowIndx : row.pq_ri,
									newRow : {tolayer : layerCount },
									checkEditable : false
								});
							});

						for(const rows of groupMap.values()){
							const maxLayer = rows.length;
							rows.forEach((row, index) =>{
								this.updateRow({
									rowIndx: row.pq_ri,
									newRow: {torevly: maxLayer - index},
									checkEditable: false
								});
							});
						}

						this.updateRow({
							rowIndx : ui.updateList[0].rowIndx,
							newRow : newRow,
							checkEditable : false
						});
					}
					if(ui.updateList[0].newRow.hasOwnProperty('tolayer')){
						const itemGrid = pq.grid('#doe033ItemGrid');
						const gridData = itemGrid.getData();
						const findSameLocAndLayer = itemGrid.getData().find(e=>{
							return e.toareky === ui.updateList[0].rowData.toareky
								&& e.tolocky === ui.updateList[0].rowData.tolocky
								&& e.tolayer === Number(ui.updateList[0].newRow.tolayer)
								&& e.skumkey !== ui.updateList[0].rowData.skumkey
								&& e.asnitst !== 'TASKCMP';
						});

						pqRi = findSameLocAndLayer ? findSameLocAndLayer.pq_ri : ui.updateList[0].rowData.pq_ri;

						newRow.tolayer = ui.updateList[0].oldRow.tolayer;

						this.updateRow({
							rowIndx : pqRi ?? ui.updateList[0].rowIndx,
							newRow : newRow,
							checkEditable : false
						});

						const sameLocRows = gridData
									        .filter(e => e.toareky === ui.updateList[0].rowData.toareky && e.tolocky === ui.updateList[0].rowData.tolocky && e.state === 'Y')
									        .sort((a, b) => a.tolayer - b.tolayer);
					    sameLocRows.forEach((row, index) => {
					        const torevlyValue = sameLocRows.length - index;

					        this.updateRow({
					            rowIndx: row.pq_ri,
					            newRow: { torevly: torevlyValue },
					            checkEditable: false
					        });
					    });
					}
				}
			});

			doe033ItemGrid.setCheck(function(evt, ui){
				if(ui.dataIndx === 'state'){
					const checkNodes = this.Checkbox('state').getCheckedNodes();
					const grouped = {};
					const tolockySet = new Set(checkNodes.map(e=> e.tolocky));
					checkNodes.sort((a, b) => (a.tolayer ?? Infinity) - (b.tolayer ?? Infinity));
					if(tolockySet.size > 1){
						alert('[[#{ms.toBeDifferent}]]');
						for(const row of ui.rows){
							row.rowData.state = 'N';
							row.rowData.tolayer = null;
							row.rowData.torevly = null;
						}
					}else if(tolockySet.size === 1){
						for(const row of ui.rows){
			                this.updateRow({
			                    rowIndx: row.rowIndx,
			                    newRow: {
			                        tolayer: null,
			                        torevly: null
			                    },
			                    checkEditable: false
			                });
							for(const checkNode of checkNodes){
					            const key = checkNode.tolocky;
					            if(!grouped[key]){
					                grouped[key] = [];
					            }
					            grouped[key].push(checkNode);
					        }

					        for(const key in grouped){
					            const group = grouped[key];
					            const maxLayer = group.length;
					            for (let i = 0; i < group.length; i++) {
					                const rowData = group[i];
					                this.updateRow({
					                    rowIndx: rowData.pq_ri,
					                    newRow: {
					                        tolayer: i + 1,
					                        torevly: maxLayer - i
					                    },
					                    checkEditable: false
					                });
					            }
					        }
						}
					}else if(tolockySet.size === 0){
						for(const row of ui.rows){
							row.rowData.tolayer = null;
							row.rowData.torevly = null;
						}
					}
				}
			});

			initFunc();
			doe033ItemGrid.setFreezeCols(1);
			doe033ItemGrid.setSelectionModel({
				type : null
			});
			doe033ItemGrid.open();
			gridSetPaste();

			async function initFunc(){
				const relationList = await Promise.allSettled([
					getReasonCodeRelationList(),
					getVehicelRelationList(),
					getAreaRelationList(),
					getLocationRelationList(),
					getRegistrationRelationList(),
					getDestinationRelationList(),
					getBtrcateList(),
					getMeqlocList()
				]);

				const dataList = [
					{
						listName: 'rsncodeRelationList'
					}, {
						listName: 'vehickyRelationList'
					}, {
						listName: 'areaRelationList'
					}, {
						listName: 'locationRelationList'
					}, {
						listName: 'registrationRelationList'
					}, {
						listName: 'destinationRelationList'
					}, {
						listName: 'btrcateList'
					}, {
						listName: 'meqlocList'
				}];

				for(let idx=0; idx < relationList.length; idx++){
					const target = dataList[idx];
					target['list'] = relationList[idx].value;
				}

				setPreloadDataOnWindow(dataList);
				resetSearchConditions(pageId, 0, 0, 7);
			};

			//초기화
			document.querySelector('#' + pageId + 'Reset').addEventListener('click', async function () {
				const grid = pq.grid('#' + pageId + 'HeadGrid');
				if(grid.pdata.length > 0){
					if (!confirm('[[#{ms.listViewRollback}]]')) {
						return;
					}
				}
				resetSearchConditions(pageId, 0, 0, 7);//공통 초기화함수

			    const equpikyFilter = equipkyList.filter(e=>{
			    	return e.warekey === document.querySelector('#doe033Warekey').value;
			    });

			    await makeOptionEquipky(equpikyFilter);

				makeEmptyGrid(doe033HeadGrid);
				makeEmptyGrid(doe033ItemGrid);
			});

			document.querySelector('#' + pageId + 'Search').addEventListener('click', function() {
				getDoe033HdGridData();
			});

			async function makeOptionEquipky(filterList){
				let html = '<option value="">[[#{ms.chooseAll}]]</option>';
				console.log(filterList)
				for(const equpikyData of filterList){
					html += '<option value="'+ equpikyData.equipky +'">'+ equpikyData.equinam +'</option>';
				}
				document.querySelector('#doe033Equipky').innerHTML = html;
			}

			async function getDoe033HdGridData() {
				const headGrid = pq.grid('#doe033HeadGrid');
				const itemGrid = pq.grid('#doe033ItemGrid');

				const searchParams = document.querySelectorAll('input[id*="doe033"], select[id*="doe033"]');

				const params = {};

				//input, selectbox 검색 조건 params.
				for(const searchParam of searchParams) {
					const key = searchParam.id.substring(6).toLowerCase();
					params[key] = searchParam.value;
				}

				doe033CurrentWarekey = params.warekey;
				headGrid.showLoading();

				const doe033Response = await fetchUtil('GET', '/im/inbound/doe033/grid/head', params);
				const asnHeadList = await doe033Response.json();

				headGrid.option('dataModel', {data: asnHeadList,recIndx: 'rowkey'});

				headGrid.refreshDataAndView();

				itemGrid.showLoading();
				itemGrid.option('dataModel', {data: []});
				itemGrid.refreshDataAndView();
				itemGrid.hideLoading();

				headGrid.hideLoading();
			}

			async function getDoe033ItGridData(objData){

				const itemGrid = pq.grid('#doe033ItemGrid');

				const param = {
						warekey : objData.warekey,
						eoasnky : objData.eoasnky,
						taskoky : objData.taskoky
				}

				itemGrid.showLoading();

				const itemResponse = await fetchUtil('GET', '/im/inbound/doe033/grid/item', param);
				const detailAsnList = await itemResponse.json();

				itemGrid.option('dataModel', {data: detailAsnList, recIndx: 'rowkey'});

				itemGrid.refreshDataAndView();
				itemGrid.hideLoading();
			}

			// 창고 변경시 자동조회
			document.querySelector('#doe033Warekey').addEventListener('change', async function() {

			    const equpikyFilter = equipkyList.filter(e=>{
			    	return e.warekey === document.querySelector('#doe033Warekey').value;
			    });

			    await makeOptionEquipky(equpikyFilter);

				const headGrid = pq.grid('#doe033HeadGrid');
				if(doe033CurrentWarekey && headGrid.pdata.length > 0){
					if (!confirm('[[#{ms.listViewRollback}]]')) {
						this.value = doe033CurrentWarekey;
						return;
					}
				}
				makeEmptyGrid(doe033ItemGrid);
				await getDoe033HdGridData();
			});

			//조업시작 버튼 클릭 시
			document.querySelector('#doe033StartOper').addEventListener('click', async function(event){
				saveDoe033Oper('/im/inbound/doe033/oper-start');
			});

			//작업완료 버튼 클릭 시
			document.querySelector('#doe033CmpTask').addEventListener('click', async function(event){
				saveDoe033Task('/im/inbound/doe033/task-cmp');
			});

			//조업완료 버튼 클릭 시
			document.querySelector('#doe033CmpOper').addEventListener('click', async function(event){
				saveDoe033Oper('/im/inbound/doe033/oper-cmp');
			});

			// 조업시작, 완료 저장
			async function saveDoe033Oper(url){
				const headGrid = pq.grid('#doe033HeadGrid');
				const itemGrid = pq.grid('#doe033ItemGrid');

				const headGridSelection = headGrid.SelectRow().getSelection();

				if(!headGridSelection.length){
					alert('[[#{ms.choiceRowZero}]]');
					return;
				}
				const headParam = headGridSelection[0].rowData;
				const validationOperStartAndCmp = await doe033Validation(headParam, url + '/validation');
				if(!validationOperStartAndCmp){
					return;
				}

				if(confirm('[[#{ms.checksave}]]')) {

					itemGrid.showLoading();

					const response = await fetchUtil('POST', url, headParam);

					if(response.status === 200){
						await getDoe033HdGridData();

						if(!url.includes('oper-cmp')){
							$('#doe033HeadGrid').pqGrid( "setSelection", {rowIndx:headParam.pq_ri});
							await getDoe033ItGridData(headParam);
						}
					}

					itemGrid.hideLoading();
				}
			}

			// 작업완료 저장
			async function saveDoe033Task(url){
				const headGridSelection = doe033HeadGrid.getGrid().SelectRow().getSelection();

				if(!headGridSelection.length){
					alert('[[#{ms.choiceRowZero}]]');
					return;
				}

				const headParam = headGridSelection[0].rowData;
				const validationTaskCmp = await doe033Validation(headParam, url + '/validation');
				if(!validationTaskCmp){
					return;
				}

				const itemGrid = pq.grid('#doe033ItemGrid');

				const itemParams = makeSaveData(doe033ItemGrid.getGrid());

				if(!itemParams){
					return;
				}

				if(!await validationLayer(itemGrid)){
					alert('[[#{ms.correctLayerInput}]]');
					return;
				}

				itemParams.updateList.sort((a, b) => {
					if(a.tolocky !== b.tolocky){
						return a.tolocky - b.tolocky;
					}

					return a.tolayer - b.tolayer
				});

				if(confirm('[[#{ms.checksave}]]')) {

					itemGrid.showLoading();

					const response = await fetchUtil('POST', url, itemParams);

					if(response.status === 200){
						await getDoe033HdGridData();

						$('#doe033HeadGrid').pqGrid( "setSelection", {rowIndx:headParam.pq_ri});
						await getDoe033ItGridData(headParam);
					}

					itemGrid.hideLoading();
				}
			}

			//그리드 내 to창고동 to베드별 tolayer가 잘 작성되었는지 수정
			async function validationLayer(itemGrid){
				const layerGroup = {};
				let layerValid;

				itemGrid.Checkbox('state').getCheckedNodes().forEach(function(data){
					const key = data.toareky + '-' + data.tolocky;
					if(!layerGroup[key]){
						layerGroup[key] = [];
					}
					layerGroup[key].push(data.tolayer);
				});

				for(const key in layerGroup){
					const layers = layerGroup[key];

					layerValid = true;

					for(let i = 0; i < layers.length; i++){
						if(layers.indexOf(i + 1) === -1 || layers.lastIndexOf(i+1) !== layers.indexOf(i+1)){
							layerValid = false;
							break;
						}
					}
				}
				return layerValid;
			}

			async function doe033Validation(param, url){

				const response = await fetchUtil('POST',url, param);

				return response.status === 200;
			}

			function gridSetPaste(){
				const itemGrid = pq.grid('#' + pageId + 'ItemGrid');
				itemGrid.option('pasteModel.on', false);
			}

			//keyup
			doe033KeydownEvt = async function (){
				const key = this.event.key || this.event.keyCode;
				if(key === 'Enter' || key === 13) {
					await getDoe033HdGridData();
				}
			}
		}();
		</script>
	 </div>
</html>
