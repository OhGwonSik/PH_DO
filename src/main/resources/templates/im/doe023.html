			// Grid 객체 생성
			async function initFunc(){
				const relationList = await Promise.allSettled([
					getReasonCodeRelationList(),
					getVehicelRelationList(),
					getAreaRelationList(),
					getLocationRelationList(),
					getDestinationRelationList(),
					getBtrcateList(),
					getMeqlocList()
				]);
				await _commonInit(pageId);

				const dataList = [
					{
						listName: 'rsncodeRelationList'
					}, {
						listName: 'vehickyRelationList'
					}, {
						listName: 'areaRelationList'
					}, {
						listName: 'locationRelationList'
					}, {
						listName: 'destinationRelationList'
				}, {
						listName: 'btrcateList'
				}, {
						listName: 'meqlocList'
				}];

				for(let idx=0; idx < relationList.length; idx++){
					const target = dataList[idx];
					target['list'] = relationList[idx].value;
				}

				setPreloadDataOnWindow(dataList);
				resetSearchConditions(pageId, 0, 0, 1);
				doe023CurrentWarekey = document.querySelector('#doe023Warekey').value;
			};

			// Grid 데이터 저장 함수
			async function saveDoe023List(saveDataList){
				if(!saveDataList){
					return false;
				}

				for(const saveData of saveDataList){
					if(saveData.doctype === '190'){
						saveData.children.sort((a, b) => {
							if(a.tolocky !== b.tolocky){
								return a.tolayer < b.tolayer ? -1 : 1;
							}

							const aTolayer = a.tolayer ? a.tolayer : Infinity;
							const bTolayer = b.tolayer ? b.tolayer : Infinity;

							return aTolayer - bTolayer;
	 	        		});
					}
				}

				const grid = pq.grid('#' + pageId + 'TreeGrid');
				grid.showLoading();
				const res = await fetchUtil('PUT', '/im/inbound/doe023/grids/1', saveDataList);

				if(res.status === 200){
					grid.option('dataModel', { data: [] });
					grid.refreshDataAndView();
				}

				grid.hideLoading();
			}

			// 초기화
			document.querySelector('#' + pageId + 'BtnReset').addEventListener('click', async function(){
				const grid = pq.grid('#' + pageId + 'TreeGrid');
				const gridData = grid.getData();
				if(gridData.length && confirm('[[#{ms.listViewRollback}]]')){
					resetSearchConditions(pageId, 0, 0, 1);
					grid.deleteNodes(grid.getData());
				}
			});

			// 저장
			document.querySelector('#' + pageId + 'BtnSave').addEventListener('click', async function(){
				const grid = pq.grid('#' + pageId + 'TreeGrid');
				// TreeGrid 사용 시 checkNodes가 아닌 pq_tree_cb 속성 사용.
				// item 해제 시 트리 헤더 pq_tree_cb === null. 헤더가 체크 해제 될 시 false.
				const gridCheck = grid.pdata.filter(e => !e.hasOwnProperty('parentId') && e.children && e.pq_tree_cb !== false);

				//헤더 체크여부 확인 후 아이템 체크 여부 필터링.
				gridCheck.forEach(element => element.children = element.children.filter(item => item.pq_tree_cb));

				if(gridCheck.length===0){
					alert('[[#{ms.choiceRowZero}]]'); // 선택된 Row가 없습니다
					return;
				}

				for(const target of gridCheck){
					const parentEssentialCols = ['warekey', 'doccate', 'doctype', 'rsncode', 'vehicky', 'vownkey', 'strdate', 'strtime'];

		    		for(let checkCol of parentEssentialCols){
	    				if(null === target[checkCol] || undefined === target[checkCol] || '' === target[checkCol]){
			    	  		alert((target.pq_ri+1)+' [[#{ms.row}]] '+'[[#{ms.requiredValue}]]' + '(' + grid.getColModel().find(e => e.dataIndx === checkCol).title + ')'); // 필수입력 값을 입력해주세요
			    	  		grid.editCell({ rowIndx : target.pq_ri, dataIndx : checkCol });
		    	  			return false;
	    				}
		    		} // header 필수 값 먼저 체크

					if(!target.children?.length){
						alert(target.id + '[[#{ms.noDetailOrder}]]');

						return false;
					} else {
						for(const child of target.children){
				    		for(let checkCol of childEssentialCols){
			    				if(null === child[checkCol] || undefined === child[checkCol] || '' === child[checkCol]){
					    	  		alert((child.pq_ri+1)+' [[#{ms.row}]] '+'[[#{ms.requiredValue}]]' + '(' + grid.getColModel().find(e => e.dataIndx === checkCol).title + ')'); // 필수입력 값을 입력해주세요
					    	  		grid.editCell({ rowIndx : child.pq_ri, dataIndx : checkCol });
				    	  			return false;
			    				}
			    				if(checkCol === 'tolayer'){
			    					const tolocAndTolayerKey = new Set();

									for(let gData of target.children){
										const key = gData.tolocky + '_' + gData.tolayer;

										if(tolocAndTolayerKey.has(key)){
											const alertTxt = '[[#{ms.DuplicateKeyErr}]]' + '( ' + (child.pq_ri+1) + '[[#{ms.row}]] & ' + (gData.pq_ri+1) + '[[#{ms.row}]] )';

											alert(alertTxt);
											grid.editCell({ rowIndx : gData.pq_ri, dataIndx : 'tolayer' });
											return false;
										}
										tolocAndTolayerKey.add(key);
									}
			    				}
				    		}
						}
					}

		    		// 입고예정확정서 헤더 저장 가능여부 판별
					let count = 0;
					target.children.forEach(e => {
						if((e.toareky && e.toareky !='') &&(e.tolocky && e.tolocky !='') && (e.ullocky && e.ullocky !='') && (e.equipky && e.equipky !='')){
							count++;
						}
					});
					target.hdsavyn = target.children.length === count ? 'Y' : 'N';
				}

				if(!confirm('[[#{ms.checksave}]]')){
					return false;
				};

				saveDoe023List(gridCheck);
			});

			// 창고 변경시 자동조회
			document.querySelector('#doe023Warekey').addEventListener('change', async function() {
				const grid = pq.grid('#doe023TreeGrid');
				if(grid.pdata.length > 0){
					if (!confirm('[[#{ms.listViewRollback}]]')) {
						this.value = doe023CurrentWarekey;
						return;
					}
				}
				doe023CurrentWarekey = this.value;
				grid.deleteNodes(grid.getData());
			});
		}();
