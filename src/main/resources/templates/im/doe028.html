				}

				this.updateRow({
					rowIndx : ui.rowIndx,
					newRow : {state : 'Y'},
					checkEditable : false
				})

			});

			doe028HeadGrid.setChange(async function(evt, ui){

							const rsncodeFilter = window['rsncodeRelationList'].find(function(data){
								return data.rsncode === updateData.newRow.rsncode;
							});

							updateData.rowData.rscate1 = rsncodeFilter?.rscate1;
						}
						this.updateRow({
							rowIndx : updateData.rowIndx,
							newRow : {
								state : 'Y'
							},
							checkEditable : false
						})
					}
				}
			});

			doe028HeadGrid.setRowInit(function(ui){
				const rsncdnmOptions = this.getColumn({dataIndx : 'rsncode'}).editor.options(ui)

					ui.rowData.rsncode = Object.keys(rsncdnmOptions[0])[0];
					ui.rowData.rscate1 = window['rsncodeRelationList']?.find( e => e['rsncode'] === ui.rowData.rsncode)?.rscate1;
				}
			});

			doe028HeadGrid.setCheck(async function(evt, ui){
				if(ui.check){

					// 아이템 변경 이력 확인

					if(gridChange.updateList.length && !confirm('[[#{ms.modifyRollback}]]')){
						this.updateRow({
							rowIndx : ui.rowIndx,
							newRow : {state : 'N'},
							checkEditable : false
						});

						return;
					}else{
						this.Checkbox('state').getCheckedNodes().forEach(e=>{
							if(e.eoasnky !== ui.rowData.eoasnky){
								this.updateRow({
									rowIndx : e.pq_ri,
									newRow : {state : 'N'},
									checkEditable : false
								});
							}
						});

						const param = {
								warekey : document.querySelector('#doe028Warekey').value,
								eoasnky : ui.rowData.eoasnky
						}

						const itemGrid = pq.grid('#doe028ItemGrid');

						itemGrid.showLoading();

						const itemResponse = await fetchUtil('GET', '/im/inbound/doe027/grid/item', param);
						const detailAsnList = await itemResponse.json();

						itemGrid.option('dataModel', {data: detailAsnList, recIndx: 'rowkey'});

						itemGrid.refreshDataAndView();
						itemGrid.hideLoading();
					}

				const dataList = [
					{
						listName: 'rsncodeRelationList'
					}];

				for(let idx=0; idx < relationList.length; idx++){
					const target = dataList[idx];
					target['list'] = relationList[idx].value;
				}

				setPreloadDataOnWindow(dataList);
				resetSearchConditions(pageId, 0, 0, 1);
			};

			//초기화
			document.querySelector('#' + pageId + 'Reset').addEventListener('click', function () {
				const grid = pq.grid('#' + pageId + 'HeadGrid');
				if(grid.pdata.length > 0){
					if (!confirm('[[#{ms.listViewRollback}]]')) {
						return;
					}
				}
				makeEmptyGrid(doe028HeadGrid);
				makeEmptyGrid(doe028ItemGrid);
				resetSearchConditions(pageId, 0, 0, 1);//공통 초기화함수
			});

			document.querySelector('#' + pageId + 'Search').addEventListener('click', function() {
				getDoe028HdGridData();
			});

			// 창고 변경시 자동조회
			document.querySelector('#' + pageId + 'Warekey').addEventListener('change', async function() {
				const headGrid = pq.grid('#doe028HeadGrid');
				if(doe028CurrentWarekey && headGrid.pdata.length > 0){
					if (!confirm('[[#{ms.listViewRollback}]]')) {
						this.value = doe028CurrentWarekey;
						return;
					}
				}
				makeEmptyGrid(doe028ItemGrid);
				getDoe028HdGridData();
			});

			async function getDoe028HdGridData() {
				const headGrid = pq.grid('#doe028HeadGrid');
				const itemGrid = pq.grid('#doe028ItemGrid');

				const searchParams = document.querySelectorAll('input[id*="doe028"], select[id*="doe028"]');

				const params = {};

				//input, selectbox 검색 조건 params.
				for(const searchParam of searchParams) {
					const key = searchParam.id.substring(6).toLowerCase();
					params[key] = searchParam.value;
				}


				doe028CurrentWarekey = params.warekey;
				headGrid.showLoading();

				const doe028Response = await fetchUtil('GET', '/im/inbound/doe027/grid/head', params);
				const asnVehickyList = await doe028Response.json();

				headGrid.option('dataModel', {data: asnVehickyList,recIndx: 'rowkey'});

				headGrid.refreshDataAndView();

				itemGrid.showLoading();
				itemGrid.option('dataModel', {data: []});
				itemGrid.refreshDataAndView();
				itemGrid.hideLoading();

				headGrid.hideLoading();
			}

			//합격 버튼 클릭 시(헤더)
			document.querySelector('#doe028SavePass').addEventListener('click', function(){
				saveHeadPassDoe028('/im/inbound/doe027/head/pass');
			});

			//불합격 버튼 클릭 시 - 입고예정오더 확정 취소 (헤더)
			document.querySelector('#doe028SaveFail').addEventListener('click', function(){
				saveHeadFailDoe028('/im/inbound/doe027/head/fail');
			});

			async function saveHeadPassDoe028(url){
				const headGrid = pq.grid('#doe028HeadGrid');
				const itemGrid = pq.grid('#doe028ItemGrid');

				const headParams = makeSaveData(headGrid);

				if(!headParams){
					return;
				}

				const isMatchRsncode = await matchPassAndFailRsncode(headParams, url);

				if(!isMatchRsncode){
					alert('[[#{ms.rsncode.error.invalid}]]');
					return;
				}

				const param = {};
				const itemGridData = itemGrid.getData();
				param['headParam'] = headParams.updateList[0];
				param['itemParam'] = itemGridData;

				if(confirm('[[#{ms.checksave}]]')) {
					itemGrid.showLoading();
					const response = await fetchUtil('POST', url, param);

					if(response.status === 200){
						makeEmptyGrid(doe028HeadGrid);
						makeEmptyGrid(doe028ItemGrid);
					}

					itemGrid.hideLoading();
				}
			}

			async function saveHeadFailDoe028(url){
				const headGrid = pq.grid('#doe028HeadGrid');
				const itemGrid = pq.grid('#doe028ItemGrid');

				const headParams = makeSaveData(headGrid);

				if(!headParams){
					return;
				}

				const isMatchRsncode = await matchPassAndFailRsncode(headParams, url);

				if(!isMatchRsncode){
					alert('[[#{ms.rsncode.error.invalid}]]');
					return;
				}

				if(confirm('[[#{ms.checksave}]]')) {
					itemGrid.showLoading();
					const response = await fetchUtil('POST', url, headParams);

					if(response.status === 200){
						makeEmptyGrid(doe028HeadGrid);
						makeEmptyGrid(doe028ItemGrid);
					}

					itemGrid.hideLoading();
				}
			}

			async function matchPassAndFailRsncode(itemParams, url){
				const isPass = url.substring(url.lastIndexOf('/')+1) === 'pass';

				if(isPass){
					const hasInvalidCode = itemParams.updateList.some(function (data){
						return data.rscate1 === 'CANCEL';
					});

					if(hasInvalidCode){
						return false;
					}
				}else{
					const hasInvalidCode = itemParams.updateList.some(function(data){
						return data.rscate1 === 'NORMAL';
					});

					if(hasInvalidCode){
						return false;
					}
				}
				return true;
			}

			function gridSetPaste(){
				const itemGrid = pq.grid('#' + pageId + 'ItemGrid');
				itemGrid.option('pasteModel.on', false);
			}

			//keyup
			doe028KeydownEvt = async function (){
				const key = this.event.key || this.event.keyCode;
				if(key === 'Enter' || key === 13) {
					await getDoe028HdGridData();
				}
			}

	      document.querySelector('#doe028RowUp').addEventListener('click', async function() {
	    	  const gridData = doe028ItemGrid.getGrid();
	    	  const selectRow = gridData.SelectRow().getSelection();

	    	  if(!selectRow.length){
	    		  return;
	    	  }

	          const selectNodes = selectRow[0].rowData;
	          if(!selectNodes.pq_ri) {
	             return;
	          }

	          const beforRowData = doe028ItemGrid.getGrid().getRowData({rowIndx : selectNodes.pq_ri - 1});
	          gridData.updateRow({
					rowIndx : beforRowData.pq_ri,
					newRow : {stlayer : beforRowData.stlayer - 1},
					checkEditable : false
			  });

	          doe028ItemGrid.getGrid().moveNodes([selectNodes], (selectNodes.pq_ri - 1));
	          gridData.updateRow({
					rowIndx : selectNodes.pq_ri,
					newRow : {stlayer : selectNodes.stlayer + 1},
					checkEditable : false
			  });
	       });

	       document.querySelector('#doe028RowDown').addEventListener('click', async function() {
	    	  const gridData = doe028ItemGrid.getGrid();
	    	  const selectRow = gridData.SelectRow().getSelection();

	    	  if(!selectRow.length){
	    		  return;
	    	  }

	    	  const selectNodes = selectRow[0].rowData;
	          if(selectNodes.pq_ri === (gridData.getData().length -1)) {
		             return;
		      }

	          const beforRowData = doe028ItemGrid.getGrid().getRowData({rowIndx : selectNodes.pq_ri + 1});
	          gridData.updateRow({
					rowIndx : beforRowData.pq_ri,
					newRow : {stlayer : beforRowData.stlayer + 1},
					checkEditable : false
			  });
	          doe028ItemGrid.getGrid().moveNodes([selectNodes], selectNodes.pq_ri + 2);
	          gridData.updateRow({
					rowIndx : selectNodes.pq_ri,
					newRow : {stlayer : selectNodes.stlayer - 1},
					checkEditable : false
			  });
	       });
		}();
		</script>
