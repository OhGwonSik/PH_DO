			        format: 'yymmdd',
			        editor: {
						type: 'textbox',
						init: dateEditor,
			        },
					editable: false,
					render: ui => {
						return {
							text: ui.cellData?.replace(regDivideDateYMD, divideDateFormatYMD)
						};
					}
				}, {
					title: '[[#{im.wasnit.delvdsr}]]',
					dataType: 'string',
					dataIndx: 'delvdsr',
			        cls: 'pq-calendar pq-side-icon',
			        format: 'yymmdd',
			        editor: {
						type: 'textbox',
						init: dateEditor,
			        },
					editable: false,
					render: ui => {
						return {
							text: ui.cellData?.replace(regDivideDateYMD, divideDateFormatYMD)
						};
					}
				},{
					title: '[[#{grid.rsncode}]]',
					dataType: 'string',
					dataIndx: 'rsncode',
					hidden: true,
					editable: false
				}, {
					title: '[[#{im.wrcvit.rcvrscd}]]',
					dataType: 'string',
					dataIndx: 'rcvrscd',
					hidden: true,
					editable: false
				}, {
					title: '[[#{im.wrcvit.rcvrscdnm}]]',
					dataType: 'string',
					dataIndx: 'rcvrscdnm',
					editable: false
				}, {
					title: '[[#{im.wrcvit.rcvrsnm}]]',
					dataType: 'string',
					dataIndx: 'rcvrsnm',
					editable: false
				}, {
					title: '[[#{im.wasnit.costrky}]]',
					dataType: 'string',
					dataIndx: 'costrky',
					editable: false
				}, {
					title: '[[#{im.wasnit.costrit}]]',
					dataType: 'integer',
					dataIndx: 'costrit',
					editable: false
				}, {
					title: '[[#{grid.credate}]]',
					dataType: 'string',
					dataIndx: 'credate',
					hidden: true,
					editable: false
				}, {
					title: '[[#{grid.cretime}]]',
					dataType: 'string',
					dataIndx: 'cretime',
					hidden: true,
					editable: false
				}, {
					title: '[[#{grid.creuser}]]',
					dataType: 'string',
					dataIndx: 'creuser',
					hidden: true,
					editable: false
				}, {
					title: '[[#{grid.lmodate}]]',
					dataType: 'string',
					dataIndx: 'lmodate',
					hidden: true,
					editable: false
				}, {
					title: '[[#{grid.lmotime}]]',
					dataType: 'string',
					dataIndx: 'lmotime',
					hidden: true,
					editable: false
				}, {
					title: '[[#{grid.lmouser}]]',
					dataType: 'string',
					dataIndx: 'lmouser',
					hidden: true,
					editable: false
				}, {
					title: '[[#{grid.updtchk}]]',
					dataType: 'integer',
					dataIndx: 'updtchk',
					editable: false,
					hidden: true
				}
			];

			// 그리드 기본 세팅
			const doe032HeadGrid = new GridUtil(doe032HeadGridCM, pageId, pageId + 'HeadGrid');
			const doe032ItemGrid = new GridUtil(doe032ItemGridCM, pageId, pageId + 'ItemGrid');

			doe032HeadGrid.setRowDblClick(async function(evt, ui){
				if(this.isEditable({dataIndx: ui.dataIndx, rowIndx: ui.rowIndx})){
					return;
				}
				const data = {
					warekey : ui.rowData.warekey,
					rcvdcky : ui.rowData.rcvdcky,
					eoasnky : ui.rowData.eoasnky,
					taskoky : ui.rowData.taskoky,
				};
				await getDoe032ItemGridList(data);
			});

			doe032HeadGrid.setCheck(function(evt, ui){
				const sameAsnAndRcvkeyList = this.getData().filter(e=>{
					return e.eoasnky === ui.rowData.eoasnky && e.rcvdcky === ui.rowData.rcvdcky
				});

				for(const sameAsnAndRcvkeyData of sameAsnAndRcvkeyList){
					this.updateRow({
						rowIndx : sameAsnAndRcvkeyData.pq_ri,
						newRow : {
							state : ui.check
						},
						checkEditable : false
					})
				}
			})

			doe032HeadGrid.setChange(async function(evt, ui){
				if(ui.source === 'edit' || ui.source === 'paste'){
					for(const updateData of ui.updateList){
						if(updateData.newRow.hasOwnProperty('rcarscd') && updateData.newRow.rcarscd){
							this.updateRow({
								rowIndx : updateData.rowIndx,
								newRow : {
									state : true
								},
								checkEditable : false
							})
						}
					}
				}
			});

			doe032HeadGrid.setRowInit(function(ui){
				const rsncdnmOptions = this.getColumn({dataIndx : 'rcarscd'}).editor.options(ui)
				if(rsncdnmOptions.length) {
					ui.rowData.rcarscd = Object.keys(rsncdnmOptions[0])[0];
				}
			});

			// 그리드 초기화 세팅
			doe032HeadGrid.setFreezeCols(1);
			doe032ItemGrid.setReset();

			doe032ItemGrid.setRowDblClick(async function(evt, ui){
				this.Checkbox('state').checkNodes(	[this.getRowData({rowIndxPage: ui.rowIndx})]);
			});

			initFunc();
			doe032HeadGrid.open();
			doe032ItemGrid.open();

			async function initFunc(){
				const relationList = await Promise.allSettled([
					getReasonCodeRelationList()
				]);

				const dataList = [
					{
						listName: 'rsncodeRelationList'
					}
				];

				for(let idx=0; idx < relationList.length; idx++){
					const target = dataList[idx];
					target['list'] = relationList[idx].value;
				}

				setPreloadDataOnWindow(dataList);
				await _commonInit(pageId);
				window.asnstat.find(e => {
					if(e.combovl === 'PASS'){
						e.pq_selected = true;
					}
				});

				resetSearchConditions(pageId, 0, 0, 1);

				$('#' + pageId + 'Asnstat').val('').attr('multiple', 'multiple')
				.pqSelect({
					searchId: pageId + 'Asnstat',
					multiplePlaceholder: '[[#{ms.chooseAll}]]',
					checkbox: true,
					selectallText: '[[#{ms.chooseAll}]]',
					displayText : '{0}개 선택',
					width: '100%',
				}).pqSelect('refreshData');

				$('#' + pageId + 'Asnstat').pqSelect({deselect : false});
			}

			// HeadGrid 데이터 조회 함수
			async function getDoe032HeadGridList(){
				const data = {
					warekey: document.querySelector('#' + pageId + 'Warekey').value,
					rcvdcky: document.querySelector('#' + pageId + 'Rcvdcky').value,
					eoasnky: document.querySelector('#' + pageId + 'Eoasnky').value,
					taskoky: document.querySelector('#' + pageId + 'Taskoky').value,
					vhcfnam: document.querySelector('#' + pageId + 'Vhcfnam').value,
					purcnum: document.querySelector('#' + pageId + 'Purcnum').value,
					orderln: document.querySelector('#' + pageId + 'Orderln').value,
 					asndateFrom: document.querySelector('#' + pageId + 'AsndateFrom').value,
 					asndateTo: document.querySelector('#' + pageId + 'AsndateTo').value,
 					asnstatList: (() => {
 						const $select = $('#' + pageId + 'Asnstat').pqSelect('getInstance').select;
 						const asnstatList = [];
 						for(const option of $select.data){
 							if(option?.selected || !$select.selectIndx.length){
 	 							asnstatList.push($select.$options[option.pq_indx].value);
 							}
 						}
 						return asnstatList;
 					})(),
				};
				data.orderlnList = document.querySelector('#' + pageId + 'Orderln').value.split(' ');
				doe032CurrentWarekey = data.warekey;
				await getGridUtilList(doe032HeadGrid, data, '/im/inbound/doe032/grids/1');
			}

			// ItemGrid 데이터 조회 함수
			async function getDoe032ItemGridList(data){
				await getGridUtilList(doe032ItemGrid, data, '/im/inbound/doe032/grids/2');
			}

			// HeadGrid 저장 함수
			async function saveDoe032HeadGridList(){
				const headGrid = doe032HeadGrid.getGrid();
				const headGridCheck = headGrid.Checkbox('state').getCheckedNodes();

				if(headGridCheck.length===0){
					alert('[[#{ms.choiceRowZero}]]'); // 선택된 Row가 없습니다

					return;
				}

				if(!validateEssentialFieldBeforeSaveGridUtil(headGrid, ['rcarscd']) || !confirm('[[#{ms.checksave}]]')){ // 저장 하시겠습니까?
					return;
				}

				await saveGridUtil(headGrid, headGridCheck, '/im/inbound/doe032/grids/1');
				makeEmptyGrid(doe032ItemGrid.getGrid());
			}

			// 검색
			document.querySelector('#' + pageId + 'BtnSearch').addEventListener('click', async function(){
  				makeEmptyGrid(doe032ItemGrid);
				await getDoe032HeadGridList();
			})

			// 초기화
			document.querySelector('#' + pageId + 'BtnReset').addEventListener('click', async function(){
				const grid = pq.grid('#' + pageId + 'HeadGrid');
				if(grid.pdata.length > 0){
					if (!confirm('[[#{ms.listViewRollback}]]')) {
						return;
					}
				}
				makeEmptyGrid(doe032HeadGrid);
				makeEmptyGrid(doe032ItemGrid);
				resetSearchConditions(pageId, 0, 0, 1);

  				$('#' + pageId + 'Asnstat').pqSelect('refreshData');
  				$('#' + pageId + 'Asnstat').val('').pqSelect('refreshData');
			})

			// 저장
			document.querySelector('#' + pageId + 'BtnSave').addEventListener('click', async function(){
				await saveDoe032HeadGridList();
			});

			//keyup
			doe032KeyupEvt = async function (){
				const key = this.event.key || this.event.keyCode;
				if(key === 'Enter' || key === 13) {
					makeEmptyGrid(doe032ItemGrid);
					await getDoe032HeadGridList();
				}
			}

			// 창고 변경시 자동조회
			document.querySelector('#' + pageId + 'Warekey').addEventListener('change', async function() {
				const headGrid = pq.grid('#doe032HeadGrid');
				if(doe032CurrentWarekey && headGrid.pdata.length > 0){
					if (!confirm('[[#{ms.listViewRollback}]]')) {
						this.value = doe032CurrentWarekey;
						return;
					}
				}
				makeEmptyGrid(doe032ItemGrid);
				await getDoe032HeadGridList();
			});
		}();
		</script>
</div>
