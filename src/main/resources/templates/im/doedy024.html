		    			}
		    			if(updateData.newRow.hasOwnProperty('custnam') && updateData.newRow.custnam){

	    					}

		    			}

		    				const destkeyTarget = window['destinationRelationList']?.find(e => e.ownerky === updateData.rowData.ownerky && e.regikey === updateData.rowData.regiorg && e.destkey === updateData.newRow.destorg);

							newRow['demodnm'] = destkeyTarget.denamlc;

							rowIndx: updateData.rowIndx,

			async function initFunc(){
				const relationList = await Promise.allSettled([

					getVehicelRelationList(),
					getAreaRelationList(),
					getLocationRelationList(),
					getRegistrationRelationList(),
					getDestinationRelationList(),

					getMeqlocList()
				]);

				const dataList = [
					{
						listName: 'rsncodeRelationList'

						listName: 'vehickyRelationList'
					}, {
						listName: 'areaRelationList'
					}, {
						listName: 'locationRelationList'
					}, {
						listName: 'registrationRelationList'

				resetSearchConditions(pageId, 0, 0, 1);

					checkbox: true,
					selectallText: '[[#{ms.chooseAll}]]',
					displayText : '{0}개 선택',
					width: '100%'
				}).pqSelect('refreshData');

				$('#' + pageId + 'Asnstat').pqSelect({deselect : false});
			}

			// HeadGrid 데이터 조회 함수
			async function getdoedy024HeadGridList(){
				const data = {
					warekey: document.querySelector('#' + pageId + 'Warekey').value,
					eoasnky: document.querySelector('#' + pageId + 'Eoasnky').value,
					vhcfnam: document.querySelector('#' + pageId + 'Vhcfnam').value,
					orderln: document.querySelector('#' + pageId + 'Orderln').value,
					purcnum: document.querySelector('#' + pageId + 'Purcnum').value,
 					asndatefrom: document.querySelector('#' + pageId + 'AsndateFrom').value,
 					asndateto: document.querySelector('#' + pageId + 'AsndateTo').value,
					asnpiyn: document.querySelector('#' + pageId + 'Asnpiyn').value,
 					asnstatList: (() => {
 						const $select = $('#' + pageId + 'Asnstat').pqSelect('getInstance').select;
 						const asnstatList = [];
 						for(const option of $select.data){
 							if(option?.selected  || !$select.selectIndx.length){
 	 							asnstatList.push($select.$options[option.pq_indx].value);
 							}
 						}
 						return asnstatList;
 					})(),
 					forInboundOrderFlag: document.querySelector('#' + pageId + 'ForInboundOrderFlag').value
				};
				if(data.orderln.trim() !== ''){
					data.orderlnList = document.querySelector('#' + pageId + 'Orderln').value.split(' ');
				}
				doedy024CurrentWarekey = data.warekey;

				await getGridUtilList(doedy024HeadGrid, data, '/im/inbound/doe024/grids/1');
			}

			// ItemGrid 데이터 조회 함수
			async function getdoedy024ItemGridList(data){
				await getGridUtilList(doedy024ItemGrid, data, '/im/inbound/doe024/grids/2');
			}

			// ItemGrid 전략 호출
			async function getdoedy024ItemStrategyList(data){
				await getGridUtilList(doedy024ItemGrid, data, '/im/inbound/doe024/grids/2/strategy', 'POST'); // POST로 보내기위함
				doedy024ItemGrid.getGrid().Checkbox('state').checkNodes(doedy024ItemGrid.getGrid().getData());
				const sameHdEoasnky = doedy024HeadGrid.getGrid().getData().find(e=> e.eoasnky === doedy024ItemGrid.getGrid().getData()[0].eoasnky);
				doedy024HeadGrid.getGrid().updateRow({
					rowIndx : sameHdEoasnky.pq_ri,
					newRow : {
						state : true
					},
					checkEditable : false
				});
			}


			async function saveDirectShipping() {
				const headGrid = doedy024HeadGrid.getGrid();
				const headGridCheck = headGrid.Checkbox('state').getCheckedNodes();

				if(!headGridCheck.length){
					alert('[[#{ms.choiceRowZero}]]'); // 선택된 Row가 없습니다
					return;
				}

				if(!confirm('[[#{ms.checkDirectShipping}]]')){ // 직송 처리 하시겠습니까?
					return;
				}

				await saveGridUtil(headGrid, headGridCheck, '/im/inbound/doe024/direct-shipping');
			}

			// HeadGrid 저장 함수
			async function savedoedy024HeadGridList(){
				const headGrid = doedy024HeadGrid.getGrid();
				const headGridCheck = headGrid.Checkbox('state').getCheckedNodes();

				if(headGridCheck.length===0){
					alert('[[#{ms.choiceRowZero}]]'); // 선택된 Row가 없습니다
					return;
				}

				const hdsavynList = headGridCheck.filter(e => e.hdsavyn === 'N');
				if(hdsavynList.length){
					const essentialValueVaildateFlag = await essentialValueVaildate('head');
					if(essentialValueVaildateFlag){
						alert('[[#{ms.saveButtonBelow}]]');
						return;
					}
					return;
				}

				if(!confirm('[[#{ms.checksave}]]')){ // 저장 하시겠습니까?
					return;
				}

				await saveGridUtil(headGrid, headGridCheck, '/im/inbound/doe024/grids/1');
				makeEmptyGrid(doedy024ItemGrid.getGrid());
			}

			// ItemGrid 데이터 저장 함수
			async function savedoedy024ItemGridList(){
				const itemGrid = doedy024ItemGrid.getGrid();
				const itemGridData = itemGrid.getData();
				const isItemEntranceCar = itemGrid.getData().filter(e=> e.asnityn !== 'N');
				// const doe021ItemGridSaveList = pqItemGrid.Checkbox('topCheck').getCheckedNodes();

				if(isItemEntranceCar.length){
					alert('[[#{ms.alreadyInbEntranceCar}]]');
					return;
				}

				if(!confirm('[[#{ms.checksave}]]')){ // 저장 하시겠습니까?
					return;
				}

				await saveGridUtil(itemGrid, itemGridData, '/im/inbound/doe024/grids/2');
				makeEmptyGrid(doedy024HeadGrid.getGrid());
				makeEmptyGrid(itemGrid);
			};

			document.querySelector('#' + pageId + 'BtnReset').addEventListener('click', async function(){

			// 입고예정확정 아이템 저장
			document.querySelector('#doedy024ItemBtnSave').addEventListener('click', async function(){
				const itemGrid = doedy024ItemGrid.getGrid();
				const itemGridData = itemGrid.Checkbox('state').getCheckedNodes();

				if(!itemGridData.length){
					alert('[[#{ms.choiceRowZero}]]'); // 선택된 Row가 없습니다
					return;
				}

				if(itemGrid.getData().length !== itemGridData.length){
					alert('[[#{ms.allCheckAsnitemData}]]');
					return;
				}

				const vaildateFlag = await essentialValueVaildate('item');

				if(vaildateFlag){
					await savedoedy024ItemGridList();
				}
			});

			async function essentialValueVaildate(gridType){
				const essentialCols = ['tolocky','equipky','ullocky'];
				const grid = doedy024ItemGrid.getGrid();
				const gridCheck = grid.getData();

				if(!gridCheck.length){
					alert('[[#{ms.noItemGridData}]]');
					return false;
				}

				for(let gCheck of gridCheck){
		    		for(let checkCol of essentialCols){
		    			if(!gCheck[checkCol] || null === gCheck[checkCol].trim() || undefined === gCheck[checkCol].trim() || '' === gCheck[checkCol].trim()){
		    				let msg = '';
		    				if(gridType === 'head'){
		    					msg = '[[#{ms.itemGridRequired}]] '+(gCheck.pq_ri+1)+' [[#{ms.row}]] '+'[[#{ms.requiredValue}]]' + '(' + grid.getColModel().find(e => e.dataIndx === checkCol).title + ')';
		    				}else{
		    					msg = (gCheck.pq_ri+1)+' [[#{ms.row}]] '+'[[#{ms.requiredValue}]]' + '(' + grid.getColModel().find(e => e.dataIndx === checkCol).title + ')'; // 필수입력 값을 입력해주세요
		    				}
			    	  		alert(msg);
			    	  		grid.editCell({ rowIndx : gCheck.pq_ri, dataIndx : checkCol });
			    	  		return false;
		    			}
		    		}
				}
				return true;
			}

			document.querySelector('#doedy024ItemStrategyBtnSave').addEventListener('click', async function(){
				const itemGrid = pq.grid('#doedy024ItemGrid');

				if(!itemGridData.length){
					alert('[[#{ms.noItemGridData}]]');
					return;
				}
				const itemGridStatFilter = itemGridData.filter(e=> e.asnityn !== 'N');

				if(itemGridStatFilter.length){
					alert('[[#{ms.alreadyInbEntranceCar}]]');
					return;

				await getdoedy024ItemStrategyList(itemGridData);

			document.querySelector('#doedy024DirectShipping').addEventListener('click', async function(){

  				makeEmptyGrid(doedy024ItemGrid);
				await getdoedy024HeadGridList();
			});

			//keyup
			doedy024KeyupEvt = async function (){
				const key = this.event.key || this.event.keyCode;
				if(key === 'Enter' || key === 13) {
	  				makeEmptyGrid(doedy024ItemGrid);
					await getdoedy024HeadGridList();
				}
			}

			// 창고 변경시 자동조회
			document.querySelector('#' + pageId + 'Warekey').addEventListener('change', async function() {
				const headGrid = pq.grid('#doedy024HeadGrid');
				if(doedy024CurrentWarekey && headGrid.pdata.length > 0){
					if (!confirm('[[#{ms.listViewRollback}]]')) {
						this.value = doedy024CurrentWarekey;
						return;
					}
				}

				await getdoedy024HeadGridList();
			});

			// 입고예정 취소
			document.querySelector('#doedy024ItemBtnDelete').addEventListener('click', async function(){

				await cancelAsnItem();
			});

			async function cancelAsnItem() {
				const itemGrid = doedy024ItemGrid.getGrid();
				const itemGridCheck = itemGrid.Checkbox('state').getCheckedNodes();

				if(!itemGridCheck.length){
					alert('[[#{ms.choiceRowZero}]]'); // 선택된 Row가 없습니다
					return;
				}

				const statNotNewCnt = itemGridCheck.filter(e=> e.asnitst !== 'NEW');

				if(statNotNewCnt.length){
					alert('[[#{ms.alreadyInboundConf}]]');
					return;
				}

				if(itemGrid.getData().length === itemGridCheck.length){
					alert('[[#{ms.inbounbItemCancel}]]');
					return;
				}

				if(!confirm('[[#{ms.choiceRowDelete}]]')){
					return;
				}

				await saveGridUtil(itemGrid, itemGridCheck, '/im/inbound/doe024/cancel-asn');
  				makeEmptyGrid(doedy024ItemGrid);
				await getdoedy024HeadGridList();
			}
		}();
