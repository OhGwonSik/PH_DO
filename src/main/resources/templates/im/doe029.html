			const doe029HeadGrid = new GridUtil(doe029HeadGridCM, pageId, pageId + 'HeadGrid');
			const doe029ItemGrid = new GridUtil(doe029ItemGridCM, pageId, pageId + 'ItemGrid');

			doe029HeadGrid.setReset();
			doe029HeadGrid.setFreezeCols(1);

			doe029HeadGrid.setRowDblClick(async function(evt, ui){
				if(this.isEditable({dataIndx: ui.dataIndx, rowIndx: ui.rowIndx})){
					return;
				}
				const data = {
					warekey : ui.rowData.warekey,
					eoasnky : ui.rowData.eoasnky
				};

				this.Checkbox('state').checkNodes(	[this.getRowData({rowIndxPage: ui.rowIndx})]);
				await getDoe029ItemGridList(data);
			});

			doe029HeadGrid.setChange(function(evt, ui){
				if('edit' === ui.source || 'paste' === ui.source){
					const updateRowList = [];

					for(const updateData of ui.updateList) {
		    			const newRow = { state: true };

		    			updateRowList.push({
							rowIndx: updateData.rowIndx,
							newRow: newRow
						});
					}
					this.updateRow({
						rowList: updateRowList,
						checkEditable: false
					});
		    	}
			});

			doe029HeadGrid.setCheck(function(evt, ui){
				for(const row of ui.rows){
					if(row.newRow.state){
						this.updateRow({
							rowIndx : row.rowIndx,
							newRow: {
								entdate : moment().format('YYYYMMDD'),
								enttime : moment().format('HHmmss')
							},
							checkEditable : false
						});
					}
				}
			});

			initFunc();
			doe029HeadGrid.open();
			doe029ItemGrid.open();

			// init
			async function initFunc(){
				await _commonInit(pageId);

				resetSearchConditions(pageId, 0, 0, 1);

				$('#' + pageId + 'Asnstat').val('').attr('multiple', 'multiple')
				.pqSelect({
					searchId: pageId + 'Asnstat',
					multiplePlaceholder: '[[#{ms.chooseAll}]]',
					checkbox: true,
					selectallText: '[[#{ms.chooseAll}]]',
					displayText : '{0}개 선택',
					width: '100%',
					maxDisplay : 1
				}).pqSelect('refreshData');

				$('#' + pageId + 'Asnstat').pqSelect({deselect : false});

			}

			// HeadGrid 데이터 조회 함수
			async function getDoe029HeadGridList(){
				const data = {
					warekey: document.querySelector('#' + pageId + 'Warekey').value,
					eoasnky: document.querySelector('#' + pageId + 'Eoasnky').value,
					vhcfnam: document.querySelector('#' + pageId + 'Vhcfnam').value,
					purcnum: document.querySelector('#' + pageId + 'Purcnum').value,
					orderln: document.querySelector('#' + pageId + 'Orderln').value,
 					asndatefrom: document.querySelector('#' + pageId + 'AsndateFrom').value,
 					asndateto: document.querySelector('#' + pageId + 'AsndateTo').value,
 					asnstatList: (() => {
 						const $select = $('#' + pageId + 'Asnstat').pqSelect('getInstance').select;
 						const asnstatList = [];
 						for(const option of $select.data){
 							if(option?.selected || !$select.selectIndx.length){
 	 							asnstatList.push($select.$options[option.pq_indx].value);
 							}
 						}
 						return asnstatList;
 					})(),
 					forExamFlag: true,
 					asnityn: 'N',
 					forInboundOrderFlag: document.querySelector('#' + pageId + 'ForInboundOrderFlag').value
				};
				data.orderlnList = document.querySelector('#' + pageId + 'Orderln').value.split(' ');
				doe029CurrentWarekey = data.warekey;
				await getGridUtilList(doe029HeadGrid, data, '/im/inbound/doe029/grids/1');
			}

			// HeadGrid 데이터 저장 함수
			async function saveDoe029HeadGridList(){
				const headGrid = doe029HeadGrid.getGrid();
				const headGridCheck = headGrid.Checkbox('state').getCheckedNodes();

				const validationResult = validateEssentialFieldBeforeSaveGridUtil(headGrid, ['entdate', 'enttime'])
				if( !validationResult || !confirm('[[#{ms.checksave}]]')){ // 저장 하시겠습니까?
					return;
				}

				await saveGridUtil(headGrid, headGridCheck, '/im/inbound/doe029/grids/1');
  				makeEmptyGrid(doe029ItemGrid);
			};

			// ItemGrid 데이터 조회 함수
			async function getDoe029ItemGridList(data){
				await getGridUtilList(doe029ItemGrid, data, '/im/inbound/doe029/grids/2');
			}

			// 검색
			document.querySelector('#' + pageId + 'BtnSearch').addEventListener('click', async function(){
  				makeEmptyGrid(doe029ItemGrid);
				await getDoe029HeadGridList();
			});

			// 초기화
			document.querySelector('#' + pageId + 'BtnReset').addEventListener('click', async function(){
				const grid = pq.grid('#' + pageId + 'HeadGrid');
				if(grid.pdata.length > 0){
					if (!confirm('[[#{ms.listViewRollback}]]')) {
						return;
					}
				}
				resetSearchConditions(pageId, 0, 0, 1);
 				makeEmptyGrid(doe029HeadGrid);
  				makeEmptyGrid(doe029ItemGrid);

  				$('#' + pageId + 'Asnstat').pqSelect('refreshData');
  				$('#' + pageId + 'Asnstat').val('').pqSelect('refreshData');
			});

			// 저장
			document.querySelector('#doe029HeadBtnSave').addEventListener('click', async function(){
				await saveDoe029HeadGridList();
			});

			//keyup
			doe029KeyupEvt = async function (){
				const key = this.event.key || this.event.keyCode;
				if(key === 'Enter' || key === 13) {
					makeEmptyGrid(doe029ItemGrid);
					await getDoe029HeadGridList();
				}
			}

			// 창고 변경시 자동조회
			document.querySelector('#' + pageId + 'Warekey').addEventListener('change', async function() {
				const headGrid = pq.grid('#doe029HeadGrid');
				if(doe029CurrentWarekey && headGrid.pdata.length > 0){
					if (!confirm('[[#{ms.listViewRollback}]]')) {
						this.value = doe029CurrentWarekey;
						return;
					}
				}
				makeEmptyGrid(doe029ItemGrid);
				await getDoe029HeadGridList();
			});
