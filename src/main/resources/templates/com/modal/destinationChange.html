<!-- destinationChangeModal -->
<div class="modal fade modalTm" id="destinationChangeModal" tabindex="-1" role="dialog" aria-labelledby="destinationChangeModal" aria-hidden="true">
	<div class="modal-dialog modal-lg" role="document">
		<div class="modal-content">
			<div class="modal-top">
				<!-- 				<div class="modal-title" style="margin: 0;">임시</div> -->
				<button type="button" class="close" data-dismiss="modal" aria-label="Close">
					<span aria-hidden="true">&times;</span>
				</button>
			</div>
			<div class="modal-body">
				<div class="setting-grid con-box">
					<label for="destinationChangeMdCustkey" class="setting-grid-title">고객명</label>
					<div class="input-group" style="grid-column: span 4; max-width: 500px; pointer-events: none;">
						<select id="destinationChangeMdCustkey" name="destinationChangeMdCustkey">
						</select>
					</div>
					<br> <label for="destinationChangeMdDestkey" class="setting-grid-title">상세착지</label>
					<div class="input-group" style="grid-column: span 4; max-width: 500px;">
						<select id="destinationChangeMdDestkey" name="destinationChangeMdDestkey">
						</select>
					</div>
					<br> <label for="destinationChangeDemdadr" class="setting-grid-title">주소</label>
					<div class="input-wrapper" style="grid-column: span 4">
						<input type="text" placeholder="주소" id="destinationChangeDemdadr" name="destinationChangeDemdadr" style="width: 100%" readonly>
					</div>
					<br> <label for="destinationChangeMdRegikey" class="setting-grid-title">목적지</label>
					<div class="input-group" style="grid-column: span 4; max-width: 500px;">
						<select id="destinationChangeMdRegikey" name="destinationChangeMdRegikey">
						</select>
					</div>
					<br> <label for="destinationChangeDemannm" class="setting-grid-title">담당자 이름</label>
					<div class="input-wrapper" style="grid-column: span 4">
						<input type="text" placeholder="담당자이름" id="destinationChangeDemannm" name="destinationChangeDemannm" style="width: 100%">
					</div>
					<br> <label for="destinationChangeDesteln" class="setting-grid-title">연락처</label>
					<div class="input-wrapper" style="grid-column: span 4">
						<input type="text" placeholder="연락처" id="destinationChangeDesteln" name="destinationChangeDesteln" style="width: 100%">
					</div>
				</div>
			</div>
			<div class="modal-bottom">
				<button class="btn-save btn-navy btn-green" id="destinationChangeModalSave">[[#{bt.save}]]</button>
				<button class="btn-white" id="destinationChangeModalCancel">[[#{bt.cancel}]]</button>
			</div>
		</div>
	</div>
</div>
<script>
	const destinationChangeModal = new bootstrap.Modal(document.getElementById('destinationChangeModal'), {
		backdrop : 'static',
		keyboard : false
	});

	function showDestinationChangeModal(changeList) {
		destinationChangeModal.show();
	}

	//모달 닫기 이벤트
	document.getElementById('destinationChangeModal').addEventListener('click', function() {
		destinationChangeModal.hide();
	});

	$('#destinationChangeModal').on('shown.bs.modal', function(){
		const custkey = document.querySelector('#destinationChangeMdCustkey').value;
		const option = document.createElement('option');
		option.value = '';
		option.text = '[[#{ms.selectOption}]]';

		//모달 목적지 selectBox
		const modalRegikeySelectBox = document.querySelector('#destinationChangeMdRegikey');
		modalRegikeySelectBox.innerHTML = '';
		modalRegikeySelectBox.appendChild(option);

		for(const registrationRelation of window['registrationRelationList']) {
			const regikeyOption = document.createElement('option');
			regikeyOption.value = registrationRelation.regikey;
			regikeyOption.text = registrationRelation.renamlc + ' [' + registrationRelation.regikey + ']';
			modalRegikeySelectBox.appendChild(regikeyOption);
		}

		$('#destinationChangeMdRegikey').pqSelect({
			searchId: 'destinationChangeMdRegikey',
			search: true,
			deselect: false,
			width: '100%'
		}).on('change', function() {
			//상세착지 관련 주소만 초기화
			document.querySelector('#destinationChangeDemdadr').value = '';
		}).pqSelect('refreshData');

		//모달 상세착지 selectBox
		const modalDestkeySelectBox = document.querySelector('#destinationChangeMdDestkey');
		modalDestkeySelectBox.innerHTML = '';
		modalDestkeySelectBox.appendChild(option);

		//동일한 고객사로 상세착지 정렬
		const filterDestkey = window.destkeyList.filter(item => item.custkey === custkey).sort((a, b) => {
			if(a.denamlc < b.denamlc) {
				return -1;
			} else if (a.denamlc > b.denamlc){
				return 1;
			} else {
				return 0;
			}
		});

		//목적지와 상세착지 이름은 상세착지 코드, 고객사 코드만으로는 가져올 수가 없음.
		//상세착지 관련된 주소, 담당자 이름, 연락처가 필요한데 이 부분도 우선 키값으로 추가함.
		//키값으로 추가해서 split을 하거나 destkey, denamlc 좀 더 완벽한 filter처리를 위해서는 regikey랑 custkey까지?
		//저 데이터들로 destkeyList에서 filter 처리를 할 수도 있음.
		//혹은 그냥 아예 db를 다녀오는 방법도 있음.
		filterDestkey.forEach(item => {
			item.key = `${item.regikey}_${item.custkey}_${item.destkey}`
		});

		for(const destkey of filterDestkey) {
			const destkeyOption = document.createElement('option');
			destkeyOption.value = destkey.key;
			destkeyOption.text = destkey.denamlc;
			modalDestkeySelectBox.appendChild(destkeyOption);
		}

		$('#destinationChangeMdDestkey').pqSelect({
			searchId: 'destinationChangeMdDestkey',
			search: true,
			deselect: false,
			width: '100%'
		}).on('change', function() {
			if(this.value === '') {
				document.querySelector('#destinationChangeDesteln').value = '';
				document.querySelector('#destinationChangeDemannm').value = '';
				document.querySelector('#destinationChangeDemdadr').value = '';
				modalDeposcd = '';
				modalDemdadr = '';

				return false;
			}

			//key 값이 regikey, destkey, custkey를 합친 유니크한 키임.
			//유니크한 키값으로 filter 처리를 한거라 제일 첫번째 값을 가져와서 객체로 바꿈.
			const filterDest = filterDestkey.filter(item => item.key === this.value)[0];

			//목적지 변경하고 값 refresh
			document.querySelector('#destinationChangeMdRegikey').value = filterDest.regikey;
			$('#destinationChangeMdRegikey').pqSelect('refreshData');

			//주소는 카카오 api를 통해서 변경하므로 전역변수로 저장하고 계속해서 바꿔줌.
			modalDeposcd = filterDest.deposcd === undefined ? '' : filterDest.deposcd;
			modalDemdadr = filterDest.desaddr === undefined ? '' : filterDest.desaddr;

				//주소변경
			document.querySelector('#destinationChangeDemdadr').value = '(' + modalDeposcd + ') ' + modalDemdadr;

			//담당자 이름 변경
			document.querySelector('#destinationChangeDemannm').value = filterDest.demannm === undefined ? '' : filterDest.demannm;

			//연락처 변경
			document.querySelector('#destinationChangeDesteln').value = filterDest.desteln === undefined ? '' : filterDest.desteln;

		}).pqSelect('refreshData');
	});

	$('#destinationChangeModal').on('hide.bs.modal', function(e) {
		//값 초기화
		document.querySelector('#destinationChangeDemdadr').value = '';
		document.querySelector('#destinationChangeDemannm').value = '';
		document.querySelector('#destinationChangeDesteln').value = '';
	});
</script>
<!-- destinationChangeModal end -->
