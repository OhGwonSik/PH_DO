			async function initSearchCondition(){
				const targetDoms = document.querySelectorAll('.setting-grid[data-visible-target=' + pageId + '] [data-visible-category]');
				targetDoms.forEach(dom => {
					if(!JSON.parse(dom.dataset.visibleCategory).includes('master')){
						dom.setAttribute('hidden', 'hidden');
						resetSearchConditions(pageId);
					} else {
						dom.removeAttribute('hidden');
					}
				});
			}

			/* Event */
			// 검색버튼 누를시 이벤트
			document.querySelector('#' + pageId + 'BtnSearch').addEventListener('click', async () => { // 임시
				const targetTab = document.querySelector('#' + pageId + 'Tab' + ' .nav-link.active');
				const tabType = targetTab.dataset.tabType;

				if('master' === tabType){
					await getDoe017StoreStrategyMasterGridList();
				} else if('strategy' === tabType){
					await getDoe017StoreStrategyHeaderGridList();
				} else if('order' === tabType){
					await getDoe017StoreStrategyForOrderGridList();
				}

			});

			// 탭 클릭시 검색영역 변경 이벤트
			document.querySelectorAll('#' + pageId + 'Tab' + ' .nav-link')?.forEach(tab => {
				tab.addEventListener('click', () => {
					const tabType = tab.dataset.tabType;
					const targetDoms = document.querySelectorAll('.setting-grid[data-visible-target=' + pageId + '] [data-visible-category]');

					targetDoms.forEach(dom => {
						if(JSON.parse(dom.dataset.visibleCategory).includes(tabType)){
							dom.removeAttribute('hidden');
						} else {
							dom.setAttribute('hidden', 'hidden');
							resetSearchConditions(pageId);
						}
					});
				});
			});

			// 초기화
			document.querySelector('#' + pageId + 'BtnReset').addEventListener('click', async () => {
				resetSearchConditions(pageId);
   				makeEmptyGrid(doe017StoreStrategyMasterGrid);
 				makeEmptyGrid(doe017StoreStrategyHeaderGrid);
 				makeEmptyGrid(doe017StoreStrategyItemGrid);
 				makeEmptyGrid(doe017StoreStrategyForOrderGrid);
			});
			/* Event end */
		}();
</script>
</div>
</html>
