<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{/main/fragment/defaultLayout}">
	<div class="tab-contents" layout:fragment="content">
		<div class="location"></div>
			<div class="search-conditions con-box">
				<div class="setting-grid">
					<label for="doe002Warekey" class="setting-grid-title ic-title-nece">[[#{menu.md.dom001}]]</label>
					<div class="setting-grid-content">
						<div class="input-group">
							<select id="doe002Warekey" name="doe002Warekey"
							data-cb-val="combovl" data-cb-name="combonm" data-cb-url="/md/organization/warehouse"
							data-cb-select="" data-cb-variable="warekeyList">
							</select>
						</div>
					</div>
					<label for="doe002Areakey" class="setting-grid-title">[[#{search.areakey}]]</label>
					<div class="setting-grid-content">
						<div class="input-wrapper">
							<input type="text" th:placeholder="${#messages.msg('search.areakey')}"
							id="doe002Areakey" name="doe002Areakey">
						</div>
					</div>
					<label for="doe002Areanam" class="setting-grid-title">[[#{search.areanam}]]</label>
					<div class="setting-grid-content">
						<div class="input-wrapper">
							<input type="text" th:placeholder="${#messages.msg('search.areanam')}"
							id="doe002Areanam" name="doe002Areanam">
						</div>
					</div>
					<label for="doe002Areatyp" class="setting-grid-title">[[#{md.marema.areatyp}]]</label>
					<div class="setting-grid-content">
						<div class="input-group">
							<select id="doe002Areatyp" name="doe002Areatyp"
								data-cb-val="combovl" data-cb-name="combonm" data-cb-url="/md/code/common-code?comcdky=areatyp"
								data-cb-select="" data-cb-variable="areatypList">
								<option value="">[[#{ms.chooseAll}]]</option>
							</select>
						</div>
					</div>
					<label for="doe002Aruseyn" class="setting-grid-title">[[#{md.useyn}]]</label>
					<div class="setting-grid-content">
						<div class="input-group">
							<select id="doe002Aruseyn" class="pq-select">
								<option value="">[[#{ms.chooseAll}]]</option>
								<option value="Y">[[#{search.use}]]</option>
								<option value="N">[[#{search.unuse}]]</option>
							</select>
						</div>
					</div>
				</div>
				<div class="search-btn-group">
					<button type="button" class="btn-search btn-navy btn-green" id="doe002BtnSearch"><img>[[#{bt.search}]]</button>
					<button type="button" class="btn-clear btn-white" id="doe002BtnReset"><img>[[#{bt.reset}]]</button>
				</div>
			</div>
			<div class="search-list">
				<div class="list-top">
					<div class="list-title ic-title-mark">
						<span>[[#{menu.md.doe002}]]</span>
					</div>
					<div class="edit-btn-wrapper">
						<button class="btn-navy btn-green" id="doe002Save"><img class="ic-bt-save">[[#{bt.save}]]</button>
					</div>
				</div>
				<div class="list-grid-wrapper con-box">
					<div id="doe002Grid"></div>
				</div>
			</div>
		<script>
		!function(){
			let doe002CurrentWarekey; // 현재 warekey 검색값 저장
			const pageId = '[[${tabPage}]]';

			// 칼럼
			const doe002GridCM = [
				{ title: '', dataType: 'bool', dataIndx: 'state', align: 'center', type: 'checkbox'
						, sortable: false, editor: false, cb: {	all: false,	header: true},
						nodrag: true, nodrop: true
				},
				{ title: '', dataType: 'string', dataIndx: 'rowkey', editable: false, hidden:true},
				{ title: '[[#{menu.md.dom001}]]', dataType: 'string', dataIndx: 'warekey', editable: false,
					editor: { options: [] }, render : gridRenderAndValue
		        },
				{ title: '[[#{grid.whnamlc}]]', dataType: 'string', dataIndx: 'whnamlc', editable: false, hidden: true },
				{ title: '[[#{grid.areakey}]]', dataType: 'string', dataIndx: 'areakey', styleHead: { 'background-color':'[[#{grid.styleHead01}]]' },
		 			editable: ui => !ui.rowData['[[#{common.grid.recIndx}]]']
				},
				{ title: '[[#{grid.areanam}]]', dataType: 'string', dataIndx: 'areanam', styleHead: { 'background-color':'[[#{grid.styleHead01}]]' }},
				{ title: '[[#{md.marema.areatyp}]]', dataType: 'string', dataIndx: 'areatyp', styleHead: { 'background-color':'[[#{grid.styleHead01}]]' },
					editor: {
						type: 'select',
			            init: function (ui) {
			            	ui.$cell.find('select').pqSelect({ checkbox : true, search: false, width: getSelectBoxWidthCondition(ui) });
			                setTimeout(function () {
			                	ui.$cell.find('select').pqSelect('open');
				        	}, 250);
						},
					    options: []
					},
					render : gridRenderAndValue
				},
				{ title: '[[#{md.memo}]]', dataType: 'string', dataIndx: 'arememo', styleHead: { 'background-color':'[[#{grid.styleHead02}]]' }},
				{ title: '[[#{md.useyn}]]', dataType: 'string', dataIndx: 'aruseyn', styleHead: { 'background-color':'[[#{grid.styleHead02}]]' }
				, type: 'checkbox', editor: false, align: 'center', cb: { all: false, header: true, check: 'Y', uncheck: 'N' }},
				{ title: '[[#{grid.credate}]]', dataType: 'string', dataIndx: 'credate', editable: false},
				{ title: '[[#{grid.cretime}]]', dataType: 'string', dataIndx: 'cretime', editable: false},
				{ title: '[[#{grid.creuser}]]', dataType: 'string', dataIndx: 'creuser', editable: false},
				{ title: '[[#{grid.lmodate}]]', dataType: 'string', dataIndx: 'lmodate', editable: false},
				{ title: '[[#{grid.lmotime}]]', dataType: 'string', dataIndx: 'lmotime', editable: false},
				{ title: '[[#{grid.lmouser}]]', dataType: 'string', dataIndx: 'lmouser', editable: false},
				{ title: '[[#{grid.updtchk}]]',  dataType: 'integer', dataIndx: 'updtchk', editable: false, hidden: true }
			]

			// 그리드 기본 설정
			const doe002Grid = new GridUtil(doe002GridCM, pageId, pageId + 'Grid');
			doe002Grid.setFind();
			doe002Grid.setReset();

			// Grid 생성시 이벤트
			doe002Grid.setCreate(async function(evt, ui) {
				await _commonInit(pageId);
				comboCreateData(pageId + 'Grid', 'warekey', warekeyList, { combovl : 'combovl', combonm : 'combonm' });
				comboCreateData(pageId + 'Grid', 'areatyp', areatypList, { combovl : 'combovl', combonm : 'combonm' });
				this.option('freezeCols', 1);
			});

			// 그리드 행 추가
			doe002Grid.setAdd(function(evt, ui){
				if(!doe002CurrentWarekey){
					alert('[[#{ms.noSearchError}]]');
					return;
				}

				const rowData = {
					state: true,
					warekey: doe002CurrentWarekey,
					whnamlc: document.querySelector('#' + pageId + 'Warekey>option[value="' + doe002CurrentWarekey + '"]').innerHTML,
					aruseyn: 'Y'
				};
				const rowIndx = this.addRow({
					rowData : rowData,
					checkEditable : false
				});

				this.goToPage({ rowIndx : rowIndx });
				this.editFirstCellInRow({ rowIndx: rowIndx });
				this.focus({
					rowIndxPage: rowIndx,
					colIndx: $('#' + pageId + 'Grid').pqGrid( 'getColIndx', { dataIndx: rowIndx } )
				});
			});

			// 그리드 데이터 변경
			doe002Grid.setChange(async function(evt, ui){
				if('checkbox' === ui.source){
					const updateRowList = [];

					await ui.updateList.forEach(updateData => {
		    			let newRow = {state: true};

		           		if(updateData.newRow.hasOwnProperty('aruseyn')){
		        			updateRowList.push({
								rowIndx: updateData.rowIndx,
								newRow: newRow
							});
		       			}
		   			});
					await this.updateRow({
						rowList: updateRowList,
						checkEditable: false
					});
		    	}else if('edit' === ui.source || 'paste' === ui.source || 'undo' === ui.source  || 'redo' === ui.source || 'clear' === ui.source){
					let areakeyData, areatypData;
		    		for(const updateData of ui.updateList) {

		    			if(updateData.newRow.hasOwnProperty('areakey') && updateData.oldRow.hasOwnProperty('areakey')){
		    				areakeyData = updateData?.newRow?.areakey?.toUpperCase().replaceAll(/\s/g, '');
		    			}

	    				if(updateData.newRow.hasOwnProperty('areatyp') && updateData.oldRow.hasOwnProperty('areatyp')){
	    					areatypData = areatypList.find(function(data){
	    						return(data.combonm === updateData.newRow['areatyp'])
	    					})
	    				}

		    			this.updateRow({
							rowIndx : updateData.rowIndx,
							newRow : {
								state: true,
								warekey: doe002CurrentWarekey,
								whnamlc: document.querySelector('#' + pageId + 'Warekey>option[value="' + doe002CurrentWarekey + '"]').innerHTML,
								areakey: areakeyData? areakeyData : updateData.rowData.areakey,
								areatyp: areatypData ? areatypData.combovl : updateData.rowData.areatyp,
								aruseyn: updateData.rowData.aruseyn
							},
							checkEditable : false
		    			})
		    		}
		    		for(const addData of ui.addList) {
		    			addData.rowData.state = true;
		    			addData.rowData.warekey = doe002CurrentWarekey;
		    			addData.rowData.whnamlc = document.querySelector('#' + pageId + 'Warekey>option[value="' + doe002CurrentWarekey + '"]').innerHTML;
		    			addData.rowData.areakey = areakeyData ? areakeyData : addData.rowData.areakey;
		    			addData.rowData.areatyp = areatypData ? areatypData.combovl : addData.rowData.areatyp;
		    			addData.rowData.aruseyn = addData?.newRow?.aruseyn || 'Y';
		    		}
		    	}
		    	doe002Grid.getGrid().refresh();
			});

			// Grid 객체 생성
			doe002Grid.open();

			// 검색 버튼
			document.querySelector('#' + pageId + 'BtnSearch').addEventListener('click', async function(){
				await getDoe002List();
			});

			// 저장 버튼
			document.querySelector('#' + pageId + 'Save').addEventListener('click', async function(){
				const validation = validateEssentialFieldBeforeSaveGridUtil(doe002Grid, ['warekey', 'areakey', 'areanam', 'areatyp'])
										&& validateDuplicationFieldBeforeSaveGridUtil(doe002Grid, ['areakey'])
										&& validateDuplicationFieldBeforeSaveGridUtil(doe002Grid, ['warekey', 'areakey']);
				if( !validation || (await !confirm('[[#{ms.checksave}]]'))){ // 저장 하시겠습니까?
					return;
				}
				await saveGridUtil(doe002Grid, refineGridUtilSaveList(doe002Grid), '/md/' + pageId + '/grid');
				await getDoe002List();
			})

			// 초기화 버튼
			document.querySelector('#' + pageId + 'BtnReset').addEventListener('click', function(){
				const grid = pq.grid('#' + pageId + 'Grid');
				if(grid.pdata.length > 0){
					if (!confirm('[[#{ms.listViewRollback}]]')) {
						return;
					}
				}
				makeEmptyGrid(doe002Grid);
				resetSearchConditions(pageId);
			})

			// 창고 변경시 자동조회
			document.querySelector('#' + pageId + 'Warekey').addEventListener('change', async function() {
				const grid = pq.grid('#' + pageId + 'Grid');
				if(doe002CurrentWarekey && grid.pdata.length > 0){
					if (!confirm('[[#{ms.listViewRollback}]]')) {
						this.value = doe002CurrentWarekey;
						return;
					}
				}
				await getDoe002List();
			});

			// Grid 데이터 조회 함수
			async function getDoe002List(){
			    const grid = pq.grid('#' + pageId + 'Grid');
			    const data = {
			    		warekey: document.querySelector('#' + pageId + 'Warekey').value.toUpperCase(),
				        areakey: document.querySelector('#' + pageId + 'Areakey').value.toUpperCase(),
				        areanam: document.querySelector('#' + pageId + 'Areanam').value.toUpperCase(),
				        areatyp: document.querySelector('#' + pageId + 'Areatyp').value,
				        aruseyn: document.querySelector('#' + pageId + 'Aruseyn').value
			    };

			    doe002CurrentWarekey = data.warekey;

			    grid.showLoading();
			    const res = await fetchUtil('GET', '/md/' + pageId + '/grid', data);
			    if (res.status === 200) {
			        const doe002List = await res.json();
			        grid.option('dataModel', {
			            data: doe002List,
			            recIndx: 'rowkey'
			        });
			        grid.refreshDataAndView();
			    }
			    grid.hideLoading();
			}

			const itemList = document.querySelectorAll('.setting-grid input');
			itemList.forEach(function(item){
				item.addEventListener('keyup', searchEnter);
			})

			// Enter로 검색
			async function searchEnter(event) {
			    const key = event.key || event.keyCode;
			    if (key === 'Enter' || key === 13) {
			        await getDoe002List();
			    }
			}

		}();
		</script>
	</div>
</html>
