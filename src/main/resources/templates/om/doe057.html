			// HeadGrid 저장 함수
			async function saveDoe057HeadGridList(){
				const headGrid = doe057HeadGrid.getGrid();
				const headGridCheck = headGrid.Checkbox('state').getCheckedNodes();
				const headGridCheckFilter = headGridCheck.filter(e => 'ING' === e.shpdcst);

				if(headGridCheck.length===0){
					alert('[[#{ms.choiceRowZero}]]'); // 선택된 Row가 없습니다

					return false;
				}

				if(headGridCheckFilter.length === 0){
					alert('작업이 완료된 문서만 확정할 수 있습니다.');

					return false;
				}

				if(!confirm('[[#{ms.checksave}]]')){ // 저장 하시겠습니까?
					return false;
				}

				headGrid.showLoading();
				const response = await fetchUtil('POST','/om/outbound/doe057/save', headGridCheck);

				if(response.status === 200){
					printShipReport(headGridCheck);
				}

				headGrid.hideLoading();
				makeEmptyGrid(doe057HeadGrid.getGrid());
				makeEmptyGrid(doe057ItemGrid.getGrid());
			}

				        reportList.push(data);

							orderln: document.querySelector('#' + pageId + 'ModalOrderln').value,
					};

					doe057targetStockData.skumkeyList = doe057targetStockData.skumkey === '' ? [] : doe057targetStockData.skumkey.split(' ');
					doe057targetStockData.orderlnList = doe057targetStockData.orderln === '' ? [] : doe057targetStockData.orderln.split(' ');

					//재고 정보 가져오기
					await getGridUtilList(doe057ModalStockGrid, doe057targetStockData, '/om/outbound/' + pageId + '/stock');

					if(!doe057ModalStockGrid.getGrid().getData().length){
						alert('대상 조건에 맞는 재고가 없습니다.');
					}
				}
			}

			// 초기화
			document.querySelector('#' + pageId + 'BtnReset').addEventListener('click', async function(){
				const grid = pq.grid('#' + pageId + 'HeadGrid');
				if(grid.pdata.length > 0){
					if (!confirm('[[#{ms.listViewRollback}]]')) {
						return;
					}
				}
				makeEmptyGrid(doe057HeadGrid);
				makeEmptyGrid(doe057ItemGrid);
				makeEmptyGrid(doe057TotalGrid);
				resetSearchConditions(pageId, 0, 0, 7);
			});

			// 저장
			document.querySelector('#' + pageId + 'BtnSave').addEventListener('click', async function(){
				await saveDoe057HeadGridList();
			});

			// 모달 초기화
			document.querySelector('#' + pageId + 'ModalBtnReset').addEventListener('click', async function(){
				makeEmptyGrid(doe057ModalStockGrid);

				document.querySelector('#' + pageId + 'ModalSkumkey').value = '';
				document.querySelector('#' + pageId + 'ModalOrderln').value = '';
			});

			// 송장 재출
			document.querySelector('#' + pageId + 'BtnReprint').addEventListener('click', async function(){
				const checkList = doe057HeadGrid.getGrid().Checkbox('state').getCheckedNodes();
				if(checkList.length === 0){
					alert('[[#{ms.choiceRowZero}]]'); // 선택된 Row가 없습니다.

					return false;
				}

 				const reprintList = checkList.filter(e => 'CMP' === e.shpdcst);
				if(reprintList.length === 0){
					alert('신규 출고문서는 송장을 재출력할 수 없습니다.');

					return false;
				}

				await printShipReport(reprintList);
			});

			// 모달 show
			document.querySelector('#' + pageId + 'BtnChangeInvoice').addEventListener('click', async function() {
				const gridSelection = doe057HeadGrid.getGrid().Checkbox('state').getCheckedNodes();
				if(gridSelection.length === 0){
					alert('선택한 [[#{ms.nodata}]]');
					return false;
				} else if(gridSelection.length > 1){
					alert('수정할 송장을 하나만 선택하세요');
					return false;
				}

				const selectionRow = gridSelection[0];

				if(selectionRow.shpdcst !== 'CMP'){
					alert('완료된 문서만 수정 할 수 있습니다.')
					return false;
				}

				const checkTransportPlanStatParam = {
					warekey: selectionRow.warekey,
					shpdcky: selectionRow.shpdcky,
					outboky: selectionRow.outboky
				}

				// 배차 상태 validation
				const transportPlanStat = await fetchUtil('GET', '/om/outbound/' + pageId + '/transport/stat', checkTransportPlanStatParam);

				if(transportPlanStat.status !== 200){
					return false;
				} else {
					const res = await transportPlanStat.json();
					if(!res){
						alert('운송이 시작되었거나 오더별 출고작업이 끝나지 않았습니다.');

						return res;
					}
				}

				const doe057ModalItemGridData = {
					warekey: selectionRow.warekey,
					shpdcky: selectionRow.shpdcky,
					taskoky: selectionRow.taskoky,
					shpplky: selectionRow.shpplky,
				};

				await getGridUtilList(doe057ModalItemGrid, doe057ModalItemGridData, '/om/outbound/' + pageId +'/grid/item');

				const doe057targetStockData = {
						warekey: selectionRow.warekey,
						shpdcky: selectionRow.shpdcky
				};

				await getGridUtilList(doe057ModalStockGrid, doe057targetStockData, '/om/outbound/' + pageId +'/stock');

				doe057ChangeInvoiceModal.show();
			});

			//모달 X 버튼 및 취소 버튼
			document.querySelector('#' + pageId + 'ChangeInvoiceMdClose').addEventListener('click', function() {
				doe057ModalHide();
			});
			document.querySelector('#' + pageId + 'ChangeInvoiceMdCancel').addEventListener('click', function() {
				doe057ModalHide();
			});

			// 모달 닫기 이벤트
			function doe057ModalHide() {
				doe057ChangeInvoiceModal.hide();
				document.activeElement.blur();
				makeEmptyGrid(doe057ModalItemGrid);
				makeEmptyGrid(doe057ModalStockGrid);
			}

			// 모달 내 검색조건 조회버튼
			document.querySelector('#' + pageId + 'ModalBtnSearch').addEventListener('click', async function(){
				const gridSelection = doe057HeadGrid.getGrid().Checkbox('state').getCheckedNodes();
				const selectionRow = gridSelection[0];
				const doe057targetStockData = {
						warekey: selectionRow.warekey,
						shpdcky: selectionRow.shpdcky,
						skumkey: document.querySelector('#' + pageId + 'ModalSkumkey').value,
						orderln: document.querySelector('#' + pageId + 'ModalOrderln').value,
				};

				doe057targetStockData.skumkeyList = doe057targetStockData.skumkey === '' ? [] : doe057targetStockData.skumkey.split(' ');
				doe057targetStockData.orderlnList = doe057targetStockData.orderln === '' ? [] : doe057targetStockData.orderln.split(' ');

				//재고 정보 가져오기
				await getGridUtilList(doe057ModalStockGrid, doe057targetStockData, '/om/outbound/' + pageId + '/stock');

				if(!doe057ModalStockGrid.getGrid().getData().length){
					alert('대상 조건에 맞는 재고가 없습니다.');
				}
			});

			// 창고 변경시 자동조회
			document.querySelector('#' + pageId + 'Warekey').addEventListener('change', async function() {
				const headGrid = pq.grid('#' + pageId + 'HeadGrid');
				if(doe057CurrentWarekey && headGrid.pdata.length > 0){
					if (!confirm('[[#{ms.listViewRollback}]]')) {
						this.value = doe057CurrentWarekey;
						return;
					}
				}
  				makeEmptyGrid(doe057ItemGrid);
				await getDoe057HeadGridList();
			});

			// 모달 내 저장버튼
			document.querySelector('#' + pageId + 'ModalBtnSave').addEventListener('click', async function(){
				const targetGrid = doe057ModalItemGrid.getGrid();
				const saveList = targetGrid.getChanges({all: true});
				const gridSelection = doe057HeadGrid.getGrid().Checkbox('state').getCheckedNodes();
				const selectionRow = gridSelection[0];

				if(gridSelection === null || gridSelection === undefined || !gridSelection.length || selectionRow.shpdcst !== 'CMP'){
					return false;
				}

				if(!confirm('[[#{ms.checksave}]]')){
					return false;
				}

				if(!targetGrid.getData().length || (!saveList?.addList?.length && !saveList?.deleteList?.length)){
					alert('저장할 [[#{ms.nodata}]]');

					return false;
				}

				try {
	  				if(await saveGridUtil(targetGrid, saveList, '/om/outbound/' + pageId + '/changeInvoice', 'POST')){
						await printShipReport([selectionRow]);
	  				}
				} catch(e) {
					console.log(e);

					return false;
				}

 				makeEmptyGrid(doe057HeadGrid);
  				makeEmptyGrid(doe057ItemGrid);
  				doe057ModalHide();
			});

			// 탭 클릭시 검색영역 변경 이벤트
			document.querySelectorAll('#' + pageId + 'Tab' + ' .nav-link')?.forEach(tab => {
				tab.addEventListener('click', async function(event) {
					const tabType = tab.dataset.tabType;
					const targetDoms = document.querySelectorAll('.setting-grid[data-visible-target=' + pageId + '] [data-visible-category]');
					for(const dom of targetDoms){
						if(JSON.parse(dom.dataset.visibleCategory).includes(tabType)){
							dom.removeAttribute('hidden');
						} else {
							dom.setAttribute('hidden', 'hidden');
						}
					}
				});
			});
		}();
		</script>
</div>
</html>
