			async function getDoe053HeadGridList(){
				const data = {
					warekey: document.querySelector('#' + pageId + 'Warekey').value,
					skumkey: document.querySelector('#' + pageId + 'Skumkey').value,
					outboky: document.querySelector('#' + pageId + 'Outboky').value,

 					shplimtTo: document.querySelector('#' + pageId + 'ShplimtTo').value,
					obostatList: (() => {
 						const $select = $('#' + pageId + 'Obostat').pqSelect('getInstance').select;
 						const obostatList = [];
 						for(const option of $select.data){
 							if(option?.selected){
 								obostatList.push($select.$options[option.pq_indx].value);
 							}
 						}
 						return obostatList;
 					})(),
				};

				data.skumkeyList = data.skumkey === '' ? [] : data.skumkey.split(' ');
				data.orderlnList = data.orderln === '' ? [] : data.orderln.split(' ');
				doe053CurrentWarekey = data.warekey;
				await getGridUtilList(doe053HeadGrid, data, '/om/outbound/' + pageId + '/grid/head');
			}

			// 출고대상확정
			async function saveDoe053HeadGridList(){
				if(!confirm('[[#{ms.checksave}]]')){ // 저장 하시겠습니까?
					return false;
				}

				const headGrid = doe053HeadGrid.getGrid();
				let notNewCnt = 0;
				const headGridCheck = headGrid.Checkbox('state').getCheckedNodes()?.filter(e => {
					if(e.obostat !== 'NEW'){
						notNewCnt++;
					}
					return e.obostat === 'NEW';
				});

				if(notNewCnt > 0){
					alert('신규 문서만 출고대상확정 처리 됩니다.');
				}

				if(headGridCheck.length===0){
					alert('[[#{ms.choiceRowZero}]]'); // 선택된 Row가 없습니다
					return false;
				}


				headGrid.showLoading();
				const response = await fetchUtil('POST', '/om/outbound/' + pageId + '/save', headGridCheck);

				if(response.status === 200){
					headGridCheck.map(data => data.type = pageId);

					await reportPrint(headGridCheck, pageId + '/order');
				}

				headGrid.hideLoading();
				makeEmptyGrid(doe053HeadGrid.getGrid());
  				makeEmptyGrid(doe053ItemGrid.getGrid());

				return response.status === 200;
			};

			document.querySelector('#' + pageId + 'BtnPrintInstruction').addEventListener('click', async function(){
				const headGrid = doe053HeadGrid.getGrid();
				const printList = headGrid.Checkbox('state').getCheckedNodes();

				if(printList.length){
					printList.forEach(data => data.type = pageId);
					await reportPrint(printList, pageId + '/order');
				} else {
					alret('[[#{ms.choiceRowZero}]]');
				}
			});

			// keyup 검색
			doe053KeyupEvt = async function (){
				const key = this.event.key || this.event.keyCode;
				if(key === 'Enter' || key === 13) {
	  				makeEmptyGrid(doe053ItemGrid);
					await getDoe053HeadGridList();
				}
			}

			// 모달 show
			document.querySelector('#' + pageId + 'BtnAddStock').addEventListener('click', async function() {
				const gridSelection = doe053HeadGrid.getGrid().Checkbox('state').getCheckedNodes();
				if(gridSelection.length === 0){
					alert('선택한 [[#{ms.nodata}]]');

					return false;
				} else if(gridSelection.length > 1){
					alert('제품을 추가할 오더를 하나만 선택하세요');

					return false;
				}

				const selectionRow = gridSelection[0];

				if(selectionRow.obostat !== 'NEW'){
					alert('신규 문서만 대상을 추가할 수 있습니다.');
					return false;
				}

				const doe053ModalHeadGridParam = {
					warekey: selectionRow.warekey,
					outboky: selectionRow.outboky
				};

				await getGridUtilList(doe053ModalHeadGrid, doe053ModalHeadGridParam, '/om/outbound/' + pageId +'/modal/grids/1');
				doe053AddStockModal.show();
			});

			// 재고 재조회
			document.querySelector('#' + pageId + 'ModalBtnSearch').addEventListener('click', async function() {
				resetSkuInformationDom();
				makeEmptyGrid(doe053ModalStockGrid);
				const modalHeadGrid = doe053ModalHeadGrid.getGrid();
				const checkNodes = modalHeadGrid.Checkbox('state').getCheckedNodes({all: true});

				if(!checkNodes.length){
					alert('오더를 먼저 조회/선택해주세요');

					return false;
				}

				const modalStockGridParam = {
					warekey: checkNodes[0].warekey,
					ownerky: checkNodes[0].ownerky,
					regikey: checkNodes[0].regikey,
					destkey: checkNodes[0].destkey,
					denamlc: checkNodes[0].denamlc,
					desaddr: checkNodes[0].desaddr,
					skugrky: checkNodes[0].plnsize,
				};

				getDoe053ModalStockGridList(modalStockGridParam);
			});

			// 재고 할당전략 조회
			document.querySelector('#' + pageId + 'ModalBtnAllocStrategy').addEventListener('click', async function() {
				resetSkuInformationDom();
				makeEmptyGrid(doe053ModalStockGrid);
				const modalHeadGrid = doe053ModalHeadGrid.getGrid();
				const modalStockGrid = doe053ModalStockGrid.getGrid();
				const modalItemGridData = doe053ModalItemGrid.getGrid().getData();
				const checkNodes = modalHeadGrid.Checkbox('state').getCheckedNodes({all: true});
				const targetNode = checkNodes[0];
				if(!checkNodes.length){
					alert('오더를 먼저 조회/선택해주세요');

					return false;
				}

				const modalHeadGridParam = {
					warekey: targetNode.warekey,
					ownerky: targetNode.ownerky,
					regikey: targetNode.regikey,
					destkey: targetNode.destkey,
					denamlc: targetNode.denamlc,
					desaddr: targetNode.desaddr,
					skugrky: targetNode.plnsize,
					doccate: targetNode.doccate,
					doctype: targetNode.doctype,
					outboky: targetNode.outboky,
				};

				await getDoe053ModalAllocationStrategyStockList(modalHeadGridParam);
				autoPickingStock(targetNode, modalItemGridData, modalStockGrid);
			});

			function autoPickingStock(targetNode, modalItemGridData, modalStockGrid){
				let AllocTotalWeight = (Number(targetNode.alcweig * 1000) - (modalItemGridData.length ? Number(modalItemGridData.reduce((acc, cur) => Number(acc + cur.skuweig), 0)) : 0));
				const checkStockNodes = [];

				// 긴급재 먼저
				for(const emergencyStockData of modalStockGrid.getData().filter(e => e.emskuyn === 'Y')){
					let tmpWeight = AllocTotalWeight;
					if((tmpWeight - emergencyStockData.skuweig > 0)){
						AllocTotalWeight -= emergencyStockData.skuweig;
						checkStockNodes.push(emergencyStockData);
					}
				}

				// 일반
				for(const normalStockData of modalStockGrid.getData().filter(e => e.emskuyn === 'N')){
					let tmpWeight = AllocTotalWeight;
					if((tmpWeight - normalStockData.skuweig > 0)){
						AllocTotalWeight -= normalStockData.skuweig;
						checkStockNodes.push(normalStockData);
					}
				}

				modalStockGrid.Checkbox('state').checkNodes(checkStockNodes);
			}
			// 모달 닫기 이벤트
			function doe053ModalHide() {
				doe053AddStockModal.hide();
				makeEmptyGrid(doe053ModalHeadGrid);
				makeEmptyGrid(doe053ModalItemGrid);
				makeEmptyGrid(doe053ModalStockGrid);
				document.activeElement.blur(); // 미추가 시 Element with focus: button 에러 발생.

				resetOrderInformationDom();
				resetSkuInformationDom();
			}

			function resetOrderInformationDom(){
				document.querySelector('#'+ pageId + 'ModalOwnerky').innerHTML = '';
				document.querySelector('#'+ pageId + 'ModalPlnsize').innerHTML = '';
				document.querySelector('#'+ pageId + 'ModalDestkey').innerHTML = '';
				document.querySelector('#'+ pageId + 'ModalDesaddr').innerHTML = '';
				document.querySelector('#'+ pageId + 'ModalAbleWeight').innerHTML = 0;
			}

			function resetSkuInformationDom(){
				document.querySelector('#'+ pageId + 'ModalItemcnt').innerHTML = 0;
				document.querySelector('#'+ pageId + 'ModalTotalKg').innerHTML = 0;
				document.querySelector('#'+ pageId + 'ModalTotalTon').innerHTML = 0;
			}

			//모달 X 버튼 및 취소 버튼
			document.querySelector('#' + pageId + 'AddStockMdClose').addEventListener('click', function() {
				doe053ModalHide();
			});
			document.querySelector('#' + pageId + 'MdBtnCancel').addEventListener('click', function() {
				doe053ModalHide();
			});

			document.querySelector('#' + pageId + 'ModalBtnSave').addEventListener('click', async function() {
				const modalHeadGrid = doe053ModalHeadGrid.getGrid();
				const modalItemGrid = doe053ModalItemGrid.getGrid();
				const modalStockGrid = doe053ModalStockGrid.getGrid();
				const modalHeadGridCheckList = modalHeadGrid.Checkbox('state').getCheckedNodes({all: true});
				const modalStockCheckList = modalStockGrid.Checkbox('state').getCheckedNodes({all: true});

				let totalItemWeight = modalItemGrid.getData().reduce((acc, cur) => Number(acc + cur.skuweig), 0);
				let totalStockWeight = modalStockCheckList.reduce((acc, cur) => Number(acc + cur.skuweig), 0);

				if(!modalStockCheckList.length){
					alert('선택한 제품이 없습니다.');

					return false;
				}

				if((modalHeadGridCheckList[0].alcweig * 1000) < (totalItemWeight + totalStockWeight)){ // 임시
					alert('할당무게를 ' + String(totalItemWeight + totalStockWeight - String(modalHeadGridCheckList[0].alcweig * 1000)).replace(/\B(?=(\d{3})+(?!\d))/g, ',') + 'kg만큼 초과합니다.');
					return false;
				}

				if(!confirm('[[#{ms.checksave}]]')){
					return false;
				}

				const param = {
					headList: modalHeadGridCheckList,
					itemList: modalStockCheckList
				}

				const res = await fetchUtil('POST', '/om/outbound/' + pageId + '/addstock', param);

				if(res.status === 200){
					alert('[[#{ms.saveSuccess}]]');
				} else {
					alert('[[#{ms.saveErr}]]');

					return false;
				}

				doe053ModalHide();
			});

			// 초기화
			document.querySelector('#' + pageId + 'BtnReset').addEventListener('click', async function(){
				const grid = pq.grid('#' + pageId + 'HeadGrid');
				if(grid.pdata.length > 0){
					if (!confirm('[[#{ms.listViewRollback}]]')) {
						return;
					}
				}
				resetSearchConditions(pageId, 0, 0, 7);
 				makeEmptyGrid(doe053HeadGrid);
  				makeEmptyGrid(doe053ItemGrid);
			});

			// 창고 변경시 자동조회
			document.querySelector('#' + pageId + 'Warekey').addEventListener('change', async function() {
				const headGrid = pq.grid('#' + pageId + 'HeadGrid');
				if(doe053CurrentWarekey && headGrid.pdata.length > 0){
					if (!confirm('[[#{ms.listViewRollback}]]')) {
						this.value = doe053CurrentWarekey;

						return;
					}
				}
  				makeEmptyGrid(doe053ItemGrid);
				await getDoe053HeadGridList();
			});

			//출고 대상 확정
			document.querySelector('#' + pageId + 'BtnSave').addEventListener('click', async function(){
				if(await saveDoe053HeadGridList()){
					await getDoe053HeadGridList();
				}
			});

			if(location.hostname.substring(0, location.hostname.indexOf('.')) === 'do-dy'  && !window.eventSource) {
				// SSE 연결
		        window.eventSource = new EventSource(rPath + '/sse/connect');
		        // 이벤트 수신
		        eventSource.addEventListener('alert', (event) => {

		            const audioContext = new (window.AudioContext || window.webkitAudioContext)();

		            // 차후 알림음 변경.
		            const oscillator1 = audioContext.createOscillator();
		            const gainNode1 = audioContext.createGain();

		            oscillator1.type = 'triangle';
		            oscillator1.frequency.setValueAtTime(1047, audioContext.currentTime);
		            oscillator1.connect(gainNode1);
		            gainNode1.connect(audioContext.destination);

		            gainNode1.gain.setValueAtTime(0.6, audioContext.currentTime);
		            gainNode1.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.4);

		            oscillator1.start(audioContext.currentTime);
		            oscillator1.stop(audioContext.currentTime + 0.4);

		            const oscillator2 = audioContext.createOscillator();
		            const gainNode2 = audioContext.createGain();

		            oscillator2.type = 'triangle';
		            oscillator2.frequency.setValueAtTime(784, audioContext.currentTime + 0.5);
		            oscillator2.connect(gainNode2);
		            gainNode2.connect(audioContext.destination);

		            gainNode2.gain.setValueAtTime(0.6, audioContext.currentTime + 0.5);
		            gainNode2.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.9);

		            oscillator2.start(audioContext.currentTime + 0.5);
		            oscillator2.stop(audioContext.currentTime + 0.9); // 0.4초 동안 재생

		            alert(event.data + ' [[#{ms.entranceDong}]]');
		        });
			}
		}();
		</script>
</div>
