			function resetModalSearchCondition(){
				document.querySelectorAll('.modal-body select[id*="' + pageId + '"]').forEach(select => {
					const $selectOptionConditionDOMs = $(select).children('option');
					const selectedOption = $selectOptionConditionDOMs.filter((_key, value) => value.hasAttribute('selected'));
					const selectValue = selectedOption.length ? selectedOption[0].value : select[0]?.value; // selected를 설정한 것이 아니라면 맨 첫번째 값으로 선택
					if('pq-select' === select.className){
						const pqSelectInstance = $('#' + select.id).pqSelect('getInstance').select;
						if('multiple' === select.getAttribute('multiple')){
							pqSelectInstance?.data?.forEach(e => e.selected = false);
							$('#' + select.id).val('');
						} else {
							pqSelectInstance?.data?.forEach(e => e.selected = (e.pq_indx === (typeof 'Number' === selectedOption[0]?.index ? selectedOption[0]?.index : 0)));
							$('#' + select.id).val(selectValue);
						}
						$('#' + select.id).pqSelect('refresh');
					} else {
						select.value = selectValue;
					}
				});

				document.querySelectorAll('.modal-body input[id*="' + pageId + '"]').forEach(element => {
					if('text' === element.type || 'number' === element.type ){
						element.value = '';
					} else if('date' === element.type || 'month' === element.type){ // date or month type
		            	if(element.className === 'emptyValue'){
		            		$(element).val('');
		            	} else {
		            		const lastDateNode = $(element).parent().find(':last-child')[0];
			                const toDate = new Date();
			                const fromDate = new Date();
			                const intervalFromDate = 1;

			                fromDate.setFullYear(fromDate.getFullYear());
			                fromDate.setMonth(fromDate.getMonth());
			                fromDate.setDate(fromDate.getDate() - ('date' === element.type ? intervalFromDate : 0)); // month type일 경우 날짜를 1일 빼면 매달 1일에 이전 달이 출력되므로 안되게 분기처리

			                if(element.isSameNode(lastDateNode)){ // lastChild일 경우
			                    $(element).val(String(toDate.getFullYear()) + '-' + String((toDate.getMonth()+1)).padStart(2, '0') + String('date' === element.type ? '-' + String(toDate.getDate()).padStart(2, '0') : ''));
			                } else {
			                	let dateValue = String(fromDate.getFullYear()) + '-' + String((fromDate.getMonth()+1)).padStart(2, '0');

			                	if('date' === element.type){
			                		dateValue +=  '-' + String(fromDate.getDate()).padStart(2, '0'); // lint에서 로직을 따로 분리하라고 하여 위에서 3항연산자로 사용하지 않음
			                	}

			                	$(element).val(dateValue);
			                }
		            	}
		            }
				});
			}

			function setSelectboxOption(optionList, id, selectedValue){
				let option = '';
				if(optionList.length){
					for(const optionData of optionList){
						for(const [value, text] of Object.entries(optionData)){
							option += '<option value="' + `${value}` + '"' + (selectedValue && selectedValue === value ? ' selected>' : '>')  + `${text}` + '</option>';
						}
					}
				}

				document.querySelector('#' + id).innerHTML = option;
				$('#' + id).pqSelect('refreshData');
			}

				const param = {};

				for(const nodeData of document.querySelectorAll('.modal-body select[id*="' + pageId + '"], input[id*="' + pageId + '"]')){
					param[convertPascalCaseToCamelCase(nodeData.id.substring((pageId + 'Modal').length))] = nodeData.value;
				}

				param.skumkeyList = param.skumkey === '' ? [] : param.skumkey.split(' ');
				param.orderlnList = param.orderln === '' ? [] : param.orderln.split(' ');
				param.locakeyList = (() => {
						const $select = $('#' + pageId + 'ModalLocakey').pqSelect('getInstance').select;
						const locakeyList = [];
						for(const option of $select.data){
							if(option?.selected){
								locakeyList.push($select.$options[option.pq_indx].value);
							}
						}
						return locakeyList;
				})();

				getGridUtilList(doe044StockGrid, param, '/om/outbound/' + pageId + '/stock', 'GET');
			}
			// 모달 내 검색조건 조회버튼
			document.querySelector('#' + pageId + 'ModalBtnSearch').addEventListener('click', async function(){
				getDoe044TargetStockList();
			});

			// 모달 내 초기화
			document.querySelector('#' + pageId + 'ModalBtnReset').addEventListener('click', async function(){
				const tempValueObj = {
						warekey: $('#' + pageId + 'ModalWarekey').val(),
						skugrky: $('#' + pageId + 'ModalSkugrky').val()
				};

				resetModalSearchCondition();
				makeEmptyGrid(doe044StockGrid);

				$('#' + pageId + 'ModalWarekey').val(tempValueObj.warekey);
				$('#' + pageId + 'ModalSkugrky').val(tempValueObj.skugrky);
			});

			// 모달 내 저장버튼
			document.querySelector('#' + pageId + 'StockMdSave').addEventListener('click', function(){
				const pqGrid = doe044TreeGrid.getGrid();
				const treeGrid = pqGrid.Tree();
				const treeGridData = treeGrid.getRoots();
				const checkedStockList = doe044StockGrid.getGrid().Checkbox('state').getCheckedNodes();

				if(!checkedStockList.length){
					alert('[[#{ms.saveAfterAdd}]]');
					return;
				}

				const checkedStockListFilter = checkedStockList.filter(addData => !treeGridData.forEach(e => {
					e.children?.some(childrenData => addData.stockky === childrenData.stockky);
				}));

				checkedStockListFilter.map(updateData => {
					const group = doe044MainGridArray.find(item =>
													item.regimod === updateData.regimod
													&& item.ownerky === updateData.ownerky
													&& item.destmod === updateData.destmod
													&& item.demodnm === updateData.demodnm
													&& item.demdadr?.trim() === updateData.demdadr?.trim()
													&& !item.data.find(dataItem => dataItem.skumkey === updateData.skumkey)
					);
					!group ? doe044MainGridArray.push({
									regimod : updateData.regimod,
									ownerky : updateData.ownerky,
									destmod: updateData.destmod,
									demodnm : updateData.demodnm,
									demdadr : updateData.demdadr,
									skugrky: document.querySelector('#' + pageId + 'ModalSkugrky').value,
									data : [updateData]
								})
								: group.data.push(updateData);
				});

				for(let i=0; i<doe044MainGridArray.length; i++) {
					const targetNode = treeGridData.find(item => {
						return item.regikey === doe044MainGridArray[i].regimod
								&& item.ownerky === doe044MainGridArray[i].ownerky
								&& item.destkey === doe044MainGridArray[i].destmod
								&& item.skugrky === doe044MainGridArray[i].skugrky
								&& item.denamlc?.trim() === doe044MainGridArray[i].demodnm?.trim()
								&& item.desaddr?.trim() === doe044MainGridArray[i].demdadr?.trim()
					});

					let nodeId=1;
					while(pqGrid.getData().findIndex(e => Number(e.id) === nodeId) !== -1){
						nodeId++;
					}

					if(targetNode){
	 					doe044MainGridArray[i].data.forEach(function(data, index) {
							let itemId=1;
							if(targetNode.children?.length){
								while(targetNode.children.findIndex(e => e.id === (targetNode.id + '-' + itemId)) !== -1){
									itemId++;
								}
							}

	 						data.id = targetNode.id + '-' + itemId;
	 						data.parentId = targetNode.id;
	 						data.planqty = 1;
							treeGrid.expandNodes(treeGrid.getNode(targetNode.id));
							treeGrid.addNodes([data]);
							treeGrid.checkNodes([data]);
	 					});
	 					const totalWeight = targetNode.children?.reduce((acc, cur) => acc = Number(acc + cur.skuweig), 0);
	 					if(targetNode.shpweig < totalWeight){
	 						targetNode.shpweig = totalWeight;
	 					}
					} else {
						const nowDate = new Date();
						const newRow = {
							id: nodeId,
							warekey: document.querySelector('#' + pageId + 'ModalWarekey').value,
		 					whnamlc: document.querySelector('#' + pageId + 'ModalWarekey :checked').innerText,
							doccate: '200',
							doctype: '230',
							rsncode: 'ETC',
							skugrky: doe044MainGridArray[i].skugrky,
		 					wpldate: (String(nowDate.getFullYear()) + String(nowDate.getMonth()+1).padStart(2, '0') + String(nowDate.getDate()).padStart(2, '0')),
		 					wpltime: (String(nowDate.getHours()).padStart(2, '0') + String(nowDate.getMinutes()).padStart(2, '0') + String(nowDate.getSeconds()).padStart(2, '0')),
		 					regikey: doe044MainGridArray[i].regimod,
		 					ownerky: doe044MainGridArray[i].ownerky,
		 					destkey: doe044MainGridArray[i].destmod,
		 					desaddr: doe044MainGridArray[i].demdadr?.trim(),
		 					denamlc: doe044MainGridArray[i].demodnm?.trim(),
		 					shpweig: doe044MainGridArray[i].data.reduce((acc, cur) => acc = Number(acc + cur.skuweig), 0)
						};
	 					doe044MainGridArray[i].data.forEach(function(data, index) {
	 						data.id = nodeId + '-' + (index + 1);
	 						data.planqty = 1;
	 					});
						treeGrid.addNodes([newRow]);
						treeGrid.expandNodes(treeGrid.getNode(nodeId));
						treeGrid.addNodes(doe044MainGridArray[i].data, treeGrid.getNode(nodeId));
						treeGrid.checkNodes(doe044MainGridArray[i].data);
					}
					checkedStockList.splice(0, checkedStockList.length); // 배열 초기화
				}
				pqGrid.refresh();
				doe044ModalHide();
			});

			document.querySelector('#' + pageId + 'Warekey').addEventListener('change', async function(event){
				if(doe044TreeGrid.getGrid().getData().length){
					if (!confirm('[[#{ms.listViewRollback}]]')) {

			// 초기화
			document.querySelector('#' + pageId + 'BtnReset').addEventListener('click', async function(){
				const grid = pq.grid('#' + pageId + 'TreeGrid');
				if(grid.pdata.length > 0){
					if(confirm('[[#{ms.modifiedDataReset}]]')){	//수정된 데이터가 있습니다. 초기화 하시겠습니까?
						resetSearchConditions(pageId);
						grid.deleteNodes(grid.getData());
						doe044MainGridArray.splice(0, doe044MainGridArray.length); // 배열 초기화
					}
				}
			});

			// 저장
			document.querySelector('#' + pageId + 'BtnSave').addEventListener('click', async function(){
				const grid = pq.grid('#' + pageId + 'TreeGrid');
				// TreeGrid 사용 시 checkNodes가 아닌 pq_tree_cb 속성 사용.
				// item 해제 시 트리 헤더 pq_tree_cb === null. 헤더가 체크 해제 될 시 false.
				const gridCheck = grid.Tree().that.pdata.filter(e => !e.hasOwnProperty('parentId') && e.pq_tree_cb !== false);
				gridCheck.forEach(e => {
					if(e.children?.length){
						e.children = e.children.filter(child => child.pq_tree_cb === true);
					}
				});
				const essentialCols = ['rsncode', 'wpldate', 'wpltime', 'skugrky', 'shpweig', 'desaddr', 'ownerky', 'regikey'];

				if(Array.isArray(essentialCols) && essentialCols.length){
					for(let gCheck of gridCheck){
			    		for(let checkCol of essentialCols){
			    			if(null === gCheck[checkCol] || undefined === gCheck[checkCol] || '' === gCheck[checkCol]){
				    	  		alert((gCheck.pq_ri+1)+' [[#{ms.row}]] '+'[[#{ms.requiredValue}]]' + '(' + grid.colModel.find(e => e.dataIndx === checkCol)?.title + ')'); // 필수입력 값을 입력해주세요
				    	  		grid.focus({ rowIndx : gCheck.pq_ri, colIndx : grid.getColIndx( {dataIndx: checkCol } ) });

				    	  		return false;
			    			}

			    			const gCheckWeightSum = gCheck.children?.reduce((acc, cur) => Number(acc + cur.skuweig), 0);
			    			if(checkCol === 'shpweig' && gCheck[checkCol] < gCheckWeightSum){
				    	  		alert((gCheck.pq_ri+1)+' [[#{ms.row}]] '+ '제품 전체의 무게보다 값이 작습니다.' + '(' + (gCheck[checkCol] - gCheckWeightSum) + grid.colModel.find(e => e.dataIndx === checkCol)?.title + ')'); // 필수입력 값을 입력해주세요
				    	  		grid.focus({ rowIndx : gCheck.pq_ri, colIndx : grid.getColIndx( {dataIndx: checkCol } ) });

				    	  		return false;
			    			}
			    		}
					}
				}

				if(!confirm('[[#{ms.checksave}]]')){
					return false;
				};

				saveDoe044List(gridCheck);
				doe044MainGridArray.splice(0, doe044MainGridArray.length); // 배열 초기화
			});
