					title: '[[#{om.ooubit.parsncd}]]',
					dataType: 'string',
					dataIndx: 'parsncd',
					editable: false
				}, {
					title: '[[#{om.ooubit.parsnnm}]]',
					dataType: 'string',
					dataIndx: 'parsnnm',
					editable: false
				}, {
					title: '[[#{om.wplnit.emskuyn}]]',
					dataType: 'string',
					dataIndx: 'emskuyn',
					type: 'checkbox',
					editable: false,
					align: 'center',
					cb: {
						all: false,
						header: false,
						check: 'Y',
						uncheck: 'N'
					}
				}, {
					title: '[[#{grid.shplimt}]]',
					dataType: 'string',
					dataIndx: 'shplimt',
					editable: false,
					render: ui => {
						return {
							text: ui.cellData?.replace(regDivideDateYMD, divideDateFormatYMD)
						};
					}
				}, {
					title: '[[#{grid.delvdsr}]]',
					dataType: 'string',
					dataIndx: 'delvdsr',
					editable: false,
					render: ui => {
						return {
							text: ui.cellData?.replace(regDivideDateYMD, divideDateFormatYMD)
						};
					}
				}, {
					title: '[[#{grid.rcvdcky}]]',
					dataType: 'string',
					dataIndx: 'rcvdcky',
					editable: false
				}, {
					title: '[[#{grid.rcvdcit}]]',
					dataType: 'string',
					dataIndx: 'rcvdcit',
					editable: false
				}, {
					title: '[[#{im.wrcvit.rcvdcdt}]]',
					dataType: 'string',
					dataIndx: 'rcvdcdt',
			        cls: 'pq-calendar pq-side-icon',
			        format: 'yymmdd',
			        editor: {
						type: 'textbox',
						init: dateEditor,
			        },
					editable: false,
					render: ui => {
						const formattedText = ui.cellData && regDivideDateYMD.test(ui.cellData)
											? ui.cellData.replace(regDivideDateYMD, divideDateFormatYMD)
											: '';

						return {
							text: formattedText
						};
					}
				},  {
					title: '[[#{im.wrcvit.rcvdctm}]]',
					dataType: 'string',
					dataIndx: 'rcvdctm',
			        cls: 'pq-calendar pq-side-icon',
			        format: 'yymmdd',
			        editor: {
						type: 'textbox',
						init: timeEditor2,
			        },
					editable: false,
					render: ui => {
						const formattedText = ui.cellData && regDivideTime.test(ui.cellData)
											? ui.cellData.replace(regDivideTime, divideTimeFormat)
											: '';

						return {
							text: formattedText
						};
					}
				},
				{ title: '[[#{grid.credate}]]', dataType: 'string', dataIndx: 'credate', editable: false, hidden: true },	// 생성일자
				{ title: '[[#{grid.cretime}]]', dataType: 'string', dataIndx: 'cretime', editable: false, hidden: true  },// 생성일시
				{ title: '[[#{grid.creuser}]]', dataType: 'string', dataIndx: 'creuser', editable: false, hidden: true  },	// 생성사용자
				{ title: '[[#{grid.lmodate}]]', dataType: 'string', dataIndx: 'lmodate', editable: false, hidden: true  },	// 수정일자
				{ title: '[[#{grid.lmotime}]]', dataType: 'string', dataIndx: 'lmotime', editable: false, hidden: true  },	// 수정일시
				{ title: '[[#{grid.lmouser}]]', dataType: 'string', dataIndx: 'lmouser', editable: false, hidden: true  },	// 수정사용자
				{ title: '[[#{grid.updtchk}]]', dataType: 'integer', dataIndx: 'updtchk', editable: false, hidden: true }
			];

			// 그리드 기본 세팅
			const doe049HeadGrid = new GridUtil(doe049HeadGridCM, pageId, pageId + 'HeadGrid');
			const doe049ItemGrid = new GridUtil(doe049ItemGridCM, pageId, pageId + 'ItemGrid');

			doe049HeadGrid.setFreezeCols(1);

			doe049HeadGrid.setCellClick(async function(evt, ui){
				if(ui.dataIndx === 'trlocml' || ui.dataIndx === 'srlocml') {
					await getLocationList(ui.rowData);
				}
			});

			doe049HeadGrid.setRowDblClick(async function(evt, ui){
				const data = {
						warekey : ui.rowData.warekey,
						vhplnky : ui.rowData.vhplnky,
						shpplky : ui.rowData.shpplky,
						plnsize : ui.rowData.plnsize
				};

				await getDoe049ItemGridList(data);
			});

			function gridLocmlChangeEvt(updateList, dataIndx1, dataIndx2, gridData) {
				const headGrid = pq.grid('#' + pageId + 'HeadGrid');

				for(const grid of headGrid.pdata) {
					if(grid.vhplnky === updateList.rowData.vhplnky) {
						gridData.updateRow({
							rowIndx: grid.pq_ri,
							newRow: {
								state: 'Y',
								[dataIndx1]: updateList.newRow[dataIndx1]
							}
						});
					}
				}
			}

			function gridCellChangeEvt(updateList, dataIndx, gridData) {
				const headGrid = pq.grid('#' + pageId + 'HeadGrid');

				for(const grid of headGrid.pdata) {
					if(grid.vhplnky === updateList.rowData.vhplnky) {
						gridData.updateRow({
							rowIndx: grid.pq_ri,
							newRow: {
								state: 'Y',
								[dataIndx]: updateList.newRow[dataIndx]
							}
						});
					}
				}
			}

			doe049HeadGrid.setChange(function(evt, ui){
				if(ui.source === 'edit' || ui.source === 'clear' || ui.source === 'paste') {
					const updateList = ui.updateList[0];

					if(updateList.newRow.hasOwnProperty('trlocml')) {
						gridLocmlChangeEvt(updateList, 'trlocml', 'srlocml', this);
					} else if(updateList.newRow.hasOwnProperty('srlocml')) {
						gridLocmlChangeEvt(updateList, 'srlocml', 'trlocml', this);
					} else if(updateList.newRow.hasOwnProperty('rsncode')) {
						gridCellChangeEvt(updateList, 'rsncode', this);
					} else if(updateList.newRow.hasOwnProperty('parsnnm')) {
						gridCellChangeEvt(updateList, 'parsnnm', this);
					}
				}
			});

			//체크이벤트
			doe049HeadGrid.setCheck(function(evt, ui) {
				const headGrid = pq.grid('#' + pageId + 'HeadGrid');
				const vhplnky = ui.rowData.vhplnky;

				for(const grid of headGrid.pdata) {
					if(grid.vhplnky === vhplnky) {
						this.updateRow({
							rowIndx: grid.pq_ri,
							newRow: {
								state: ui.check ? 'Y' : 'N',
								rsncode: ui.check ? 'ETC' : '',
							}
						});
					}
				}

			});

			doe049HeadGrid.setReset();

			doe049ItemGrid.setRowInit(async function(ui){
				const rd = ui.rowData;

				if( 'Y' === rd.emskuyn ){
					return {
						style: 'background: #FFC90E; font-weight: bold;'
					};
				}
			});

			initFunc();
			doe049HeadGrid.open();
			doe049ItemGrid.open();

			async function getLocationList(rowData) {
				const data = {
					warekey: rowData.warekey,
					vhplnky: rowData.vhplnky
				}
				const res = await fetchUtil('GET', '/om/outbound/common/location-list', data);
				const locationData = await res.json();

				comboCreateData(pageId + 'HeadGrid', 'trlocml', locationData, { combovl: 'locanam', combonm: 'locakey' });
				comboCreateData(pageId + 'HeadGrid', 'srlocml', locationData, { combovl: 'locanam', combonm: 'locakey' });
			}

			async function initFunc(){
				await _commonInit(pageId);
				const relationList = await Promise.allSettled([
					getReasonCodeRelationList(),
					getAreaRelationList(),
					getLocationRelationList(),
					getRegistrationRelationList(),
					getDestinationRelationList()
				]);

				const dataList = [
					{
						listName: 'rsncodeRelationList'
					}, {
						listName: 'areaRelationList'
					}, {
						listName: 'locationRelationList'
					}, {
						listName: 'registrationRelationList'
					}, {
						listName: 'destinationRelationList'
				}];

				for(let idx=0; idx < relationList.length; idx++){
					const target = dataList[idx];
					target['list'] = relationList[idx].value;
				}
				setPreloadDataOnWindow(dataList);
				resetSearchConditions(pageId, 0, 0, 7);
			}

			// HeadGrid 데이터 조회 함수
			async function getDoe049HeadGridList(){
				const data = {
					warekey: document.querySelector('#' + pageId + 'Warekey').value,
					skumkey: document.querySelector('#' + pageId + 'Skumkey').value,
					vhplnky: document.querySelector('#' + pageId + 'Vhplnky').value,
					demodnm: document.querySelector('#' + pageId + 'Denamlc').value,
					orderln: document.querySelector('#' + pageId + 'Orderln').value,
					vhcfnam: document.querySelector('#' + pageId + 'Vhcfnam').value,
					vhpdatefrom: document.querySelector('#' + pageId + 'VhpdateFrom').value,
					vhpdateto: document.querySelector('#' + pageId + 'VhpdateTo').value,
 					shplimtFrom: document.querySelector('#' + pageId + 'ShplimtFrom').value,
 					shplimtTo: document.querySelector('#' + pageId + 'ShplimtTo').value,
				};

				data.skumkeyList = data.skumkey === '' ? [] : data.skumkey.split(' ');
				data.orderlnList = data.orderln === '' ? [] : data.orderln.split(' ');
				doe049CurrentWarekey = data.warekey;
				await getGridUtilList(doe049HeadGrid, data, '/om/outbound/'+ pageId + '/grids/head');
			}

			// ItemGrid 데이터 조회 함수
			async function getDoe049ItemGridList(data){
				await getGridUtilList(doe049ItemGrid, data, '/om/outbound/'+ pageId + '/grids/item');
			}

			// HeadGrid 데이터 저장 함수
			async function saveDoe049HeadGridList(){
				const headGrid = doe049HeadGrid.getGrid();
				const headGridCheck = headGrid.Checkbox('state').getCheckedNodes();
				if( !validateEssentialFieldBeforeSaveGridUtil(doe049HeadGrid, ['rsncode']) || (!confirm('[[#{ms.checksave}]]'))){ // 저장 하시겠습니까?
					return false;
				}

				const filterList = headGridCheck.map(item => ({
					warekey: item.warekey,
					vhplnky: item.vhplnky,
					shpplky: item.shpplky,
					vehicky: item.vehicky,
					vownkey: item.vownkey,
					rsncode: item.rsncode,
					parsnnm: item.parsnnm,
					shpweig: item.shpweig,
					trlocml: item.trlocml,
					srlocml: item.srlocml,
				}));

				const setList = Array.from(new Set(filterList.map(item => JSON.stringify(item)))).map(item => JSON.parse(item));

				if(await saveGridUtil(headGrid, setList, '/om/outbound/'+ pageId + '/save')){
					makeEmptyGrid(doe049HeadGrid.getGrid());
	  				makeEmptyGrid(doe049ItemGrid.getGrid());
				};
			};

			// 검색
			document.querySelector('#' + pageId + 'BtnSearch').addEventListener('click', async function(){
  				makeEmptyGrid(doe049ItemGrid);
				await getDoe049HeadGridList();
			});

			// keyup 검색
			doe049KeyupEvt = async function (){
				const key = this.event.key || this.event.keyCode;
				if(key === 'Enter' || key === 13) {
	  				makeEmptyGrid(doe049ItemGrid);
					await getDoe049HeadGridList();
				}
			}

			// 창고 변경시 자동조회
			document.querySelector('#' + pageId + 'Warekey').addEventListener('change', async function() {
				const headGrid = pq.grid('#' + pageId + 'HeadGrid');
				if(doe049CurrentWarekey && headGrid.pdata.length > 0){
					if (!confirm('[[#{ms.listViewRollback}]]')) {
						this.value = doe049CurrentWarekey;
						return;
					}
				}
  				makeEmptyGrid(doe049ItemGrid);
				await getDoe049HeadGridList();
			});

			// 초기화
			document.querySelector('#' + pageId + 'BtnReset').addEventListener('click', async function(){
				const grid = pq.grid('#' + pageId + 'HeadGrid');
				if(grid.pdata.length > 0){
					if (!confirm('[[#{ms.listViewRollback}]]')) {
						return;
					}
				}
				resetSearchConditions(pageId, 0, 0, 7);
 				makeEmptyGrid(doe049HeadGrid);
  				makeEmptyGrid(doe049ItemGrid);
			});

			//출고 지시
			document.querySelector('#'+ pageId + 'BtnSave').addEventListener('click', async function(){
				await saveDoe049HeadGridList();
			});
		}();
		</script>
</div>
</html>
