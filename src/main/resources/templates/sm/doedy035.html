<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{/main/fragment/defaultLayout}">
	<div class="tab-contents" layout:fragment="content">
		<div class="location"></div>
		<div class="search-conditions con-box">
			<div class="setting-grid">
				<label for="doedy035Warekey" class="setting-grid-title ic-title-nece">[[#{search.whnamlc}]]</label>
				<div class="setting-grid-content">
					<div class="input-group">
						<select id="doedy035Warekey" name="doedy035Warekey"
						data-cb-val="combovl" data-cb-name="combonm" data-cb-url="/md/organization/warehouse"
						data-cb-select="" data-cb-variable="warekeyList">
						</select>
					</div>
				</div>
				<label for="doedy035Areakey" class="setting-grid-title">[[#{search.areanam}]]</label>
				<div class="setting-grid-content">
					<div class="input-group">
						<select id="doedy035Areakey" name="doedy035Areakey"
						data-cb-val="areakey" data-cb-name="areanam" data-cb-url="/md/organization/area/relation"
						data-cb-select="" data-cb-variable="areakeyList">
							<option value="">[[#{ms.chooseAll}]]</option>
						</select>
					</div>
				</div>
				<label for="doedy035Locakey" class="setting-grid-title">[[#{search.locanam}]]</label>
				<div class="setting-grid-content">
					<div class="input-group">
						<select id="doedy035Locakey" name="doedy035Locakey"
						data-cb-val="locakey" data-cb-name="locanam" data-cb-url="/md/wal-relations?loctypeList=BED,TMP"
						data-cb-select="" data-cb-variable="locakeyList">
						</select>
					</div>
				</div>
				<label for="doedy035Skumkey" class="setting-grid-title">[[#{search.skuCode}]]</label>
				<div class="setting-grid-content">
					<div class="input-wrapper">
						<input type="text" th:placeholder="${#messages.msg('search.skuCode')}" id="doedy035Skumkey" name="doedy035Skumkey" onkeyup="doedy035KeyupEvt()"/>
					</div>
				</div>
				<label for="doedy035Custnam" class="setting-grid-title">[[#{search.cunamlc}]]</label>
				<div class="setting-grid-content">
					<div class="input-wrapper">
						<input type="text" th:placeholder="${#messages.msg('search.cunamlc')}" id="doedy035Custnam" name="doedy035Custnam" onkeyup="doedy035KeyupEvt()"/>
					</div>
				</div>
				<label for="doedy035Purcnum" class="setting-grid-title">[[#{grid.purcnum}]]</label>
				<div class="setting-grid-content">
					<div class="input-wrapper">
						<input type="text" th:placeholder="${#messages.msg('grid.purcnum')}" id="doedy035Purcnum" name="doedy035Purcnum" onkeyup="doedy035KeyupEvt()">
					</div>
				</div>
				<label for="doedy035Orderln" class="setting-grid-title">[[#{grid.orderln}]]</label>
				<div class="setting-grid-content">
					<div class="input-wrapper">
						<input type="text" th:placeholder="${#messages.msg('grid.orderln')}" id="doedy035Orderln" name="doedy035Orderln" onkeyup="doedy035KeyupEvt()">
					</div>
				</div>
				<label for="doedy035Regikey" class="setting-grid-title">[[#{search.renamlc}]]</label>
				<div class="setting-grid-content">
					<div class="input-group">
						<select id="doedy035Regikey"
							data-cb-val="combovl" data-cb-name="combonm" data-cb-url="/md/partner/region"
							data-cb-select="" data-cb-variable="regionList">
						</select>
					</div>
				</div>
				<label for="doedy035Demodnm" class="setting-grid-title">[[#{search.denamlc}]]</label>
				<div class="setting-grid-content">
					<div class="input-wrapper">
						<input type="text" th:placeholder="${#messages.msg('search.denamlc')}" id="doedy035Demodnm" name="doedy035Demodnm" onkeyup="doedy035KeyupEvt()">
					</div>
				</div>
			</div>
			<div class="search-btn-group">
				<button type="button" class="btn-search btn-navy btn-green" id="doedy035BtnSearch"><img>[[#{bt.search}]]</button>
				<button type="button" class="btn-clear btn-white" id="doedy035BtnReset"><img>[[#{bt.reset}]]</button>
			</div>
		</div>
		<div class="search-list">
			<div class="list-top">
				<div class="list-title ic-title-mark">
					<span>[[#{menu.sm.doedy035}]]</span>
				</div>
				<div class="edit-btn-wrapper">
					<span>[[#{grid.itemcnt}]] : </span>
                    <span id="doedy035Itemcnt">0</span>
                    /
                    <span>[[#{bm.common.totalwg}]] : </span>
                    <span id="doedy035TotalKg">0</span>
                    /
                    <span>[[#{sy.main.totalWeight}]] : </span>
                    <span id="doedy035TotalTon">0</span>
					<button class="btn-navy btn-green" id="doedy035BtnEachSave"><img class="ic-bt-save">[[#{bt.eachSelectionInstruction}]]</button>
					<button class="btn-navy btn-green" id="doedy035BtnSave"><img class="ic-bt-save">[[#{bt.selectionInstruction}]]</button>
				</div>
			</div>
			<div class="list-grid-wrapper con-box">
				<div id="doedy035Grid"></div>
			</div>
		</div>
	<!-- 아이템 재고추가 모달 -->
	<div class="modal fade modalTm" id="doedy035LocationModal" role="dialog" aria-labelledby="doedy035LocationModal" aria-hidden="true">
			<div class="modal-dialog .modal-sm" role="document" style="width: 400px">
				<div class="modal-content">
					<div class="modal-top">
						<button type="button" class="close" id="doedy035LocationMdClose" aria-label="Close">
							<span aria-hidden="true">&times;</span>
						</button>
					</div>
					<div class="modal-body doedy035">
							<div class="list-top">
								<div class="list-title ic-title-mark">
									<span>위치지정</span>
								</div>
							</div>
							<div class="setting-grid con-box" style="grid-template-columns: 70px 1fr;">
								<label for="doedy035ModalAreakey" class="setting-grid-title ic-title-nece">[[#{sm.wstkky.toareky}]]</label>
									<div class="setting-grid-content">
									<div class="input-group">
										<select id="doedy035ModalAreakey"></select>
									</div>
								</div>

					        	<label for="doedy035ModalLocakey" class="setting-grid-title ic-title-nece">[[#{sm.wstkky.tolocky}]]</label>
								<div class="setting-grid-content">
									<div class="input-group">
										<select id="doedy035ModalLocakey"></select>
									</div>
								</div>

								<label for="doedy035ModalEquipky" class="setting-grid-title ic-title-nece">[[#{sm.wstkky.equipky}]]</label>
								<div class="setting-grid-content">
									<div class="input-group">
										<select id="doedy035ModalEquipky"></select>
									</div>
								</div>

								<label for="doedy035Layer" class="setting-grid-title">[[#{sm.wstkky.tolayer}]]</label>
								<div class="setting-grid-content">
									<div class="input-date-group">
										<input type="number" id="doedy035ModalLayerFrom" disabled="disabled">
										<span>~</span>
										<input type="number" id="doedy035ModalLayerTo" disabled="disabled">
									</div>
								</div>

								<label for="doedy035ModalParsncd" class="setting-grid-title ic-title-nece">[[#{sm.wstkky.parsncd}]]</label>
								<div class="setting-grid-content">
									<div class="input-group">
										<select id="doedy035ModalParsncd"></select>
									</div>
								</div>

								<label for="doedy035ModalParsnnm" class="setting-grid-title">[[#{sm.wstkky.parsnnm}]]</label>
								<div class="setting-grid-content">
									<div class="input-group">
										<input type="text" id="doedy035ModalParsnnm" style="width: 400px;">
									</div>
								</div>
							</div>
					</div>
					<div class="modal-bottom">
						<button class="btn-white" id="doedy035LocationMdSave">[[#{bt.save}]]</button>
						<button class="btn-save btn-navy btn-green" id="doedy035LocationMdCancel">[[#{bt.cancel}]]</button>
					</div>
				</div>
			</div>
		</div>
	<script>
	!function(){
		console.log('doedy035 :: 선별지시등록')
		const pageId = '[[${tabPage}]]';

		let doedy035StockList;
		let doedy035InitData;
		let doedy035CurrentWarekey;
		const locationModalId = document.getElementById('doedy035LocationModal');
		//모달 키보드와 마우스로 안닫히게끔 설정
		const locationModal = new bootstrap.Modal(locationModalId, {
			backdrop: 'static',
			keyboard: false
		});
		const doedy035GridCM = [
			{ title: '',
				dataType: 'string',
				dataIndx: 'state',
				type: 'checkbox',
				align: 'center',
				maxWidth:'30',
				maxHeight:'30',
				menuIcon: false,
				sortable: false,
				nodrag: true,
				nodrop: true,
				cb: { all: false, header: true, check: 'Y', uncheck: 'N' },
				editable: function(ui) {
					const row = ui.rowData;
					// 이 조건 중 하나라도 true면 편집 불가 (회색 처리됨)
					if (row.planqty || row.sbloqty || row.emskuyn === 'Y' || row.taskqty != 0) {
						return false;
					}
					return true;
				},
				render: ui => {
					return {
						cls: ui?.column?.editable(ui) ? '' : 'color-gray pq-cell-disable'
					};
				}
			},
			{ title: '[[#{common.grid.recIndx}]]', dataType: 'string', dataIndx: 'rowkey', editable: false, hidden: true },
			{ title: '[[#{sm.wstkky.stockky}]]', dataType: 'string', dataIndx: 'stockky', editable: false, hidden: true}, // hidden 처리
			{ title: '[[#{grid.wareCode}]]', dataType: 'string', dataIndx: 'warekey', editable: false, hidden: true }, // hidden 처리
			{ title: '[[#{grid.whnamlc}]]', dataType: 'string', dataIndx: 'whnamlc', editable: false },
			{ title: '[[#{grid.areakey}]]', dataType: 'string', dataIndx: 'areakey', editable: false, hidden: true }, // hidden 처리
			{ title: '[[#{grid.areanam}]]', dataType: 'string', dataIndx: 'areanam', editable: false },
			{ title: '[[#{grid.locakey}]]', dataType: 'string', dataIndx: 'locakey', editable: false, hidden: true }, // hidden 처리
			{ title: '[[#{grid.locanam}]]', dataType: 'string', dataIndx: 'locanam', editable: false },
			{ title: '[[#{grid.layer}]]', dataType: 'integer', dataIndx: 'lolayer', editable: false },
			{ title: '[[#{sm.wstkky.toareky}]]', dataType: 'string', dataIndx: 'toareky',
				styleHead: { 'background-color':'[[#{grid.styleHead01}]]' },
				editor: {
					type: 'select',
		            init: function (ui) {
		            	ui.$cell.find('select').pqSelect( {
		            		checkbox : true,
						 	search: false,
						 	width: getSelectBoxWidthCondition(ui)
						});
		                setTimeout(function () {
		                	ui.$cell.find('select').pqSelect('open');
			        	}, 250);
					},
					options: ui => {
						return window['areaRelationList']?.map(e => {
							if(e.warekey === ui.rowData.warekey){
								const obj = {};
								obj[e.areakey] = e.areanam;

								return obj;
							}
						}).filter(e => e);
					}
				},
				render: ui => {
					const target = window['areaRelationList']?.find( e => e.warekey === ui.rowData?.warekey && e['areakey'] === ui.cellData);
					ui.rowData[ui.dataIndx] = target ? target.areakey : '';
					return {
						text: target ? target.areanam : ''
					};
				}
			},
			{ title: '[[#{sm.wstkky.tolocky}]]', dataType: 'string', dataIndx: 'tolocky',
				styleHead: { 'background-color':'[[#{grid.styleHead01}]]' },
				editor: {
					type: 'select',
		            init: function (ui) {
		            	ui.$cell.find('select').pqSelect( {
		            		checkbox : true,
						 	search: false,
						 	width: getSelectBoxWidthCondition(ui)
		            	});
		                setTimeout(function () {
		                	ui.$cell.find('select').pqSelect('open');
			        	}, 250);
					},
					options: ui => {
						return window['locationRelationList']?.map(e => {
							if(e.warekey === ui.rowData.warekey && e.areakey === ui.rowData.toareky && e.loctype === 'BED'){
								const obj = {};
								obj[e.locakey] = e.locanam;

								return obj;
							}
						}).filter(e => e);
					}
				},
				render: ui => {
					const target = window['locationRelationList']?.find( e => e.warekey === ui.rowData?.warekey && e.areakey === ui.rowData.toareky && e.locakey === ui.cellData && e.loctype === 'BED');
					ui.rowData[ui.dataIndx] = target ? target.locakey : '';
					return {
						text: target ? target.locanam : ''
					};
				}
			}, {
				title: '[[#{grid.equipky}]]',
				dataType: 'string',
				dataIndx: 'equipky',
				styleHead: {
					'background-color': '[[#{grid.styleHead01}]]'
				},
				editor: {
					type: 'select',
					init: ui => {
	        			 ui.$cell.find('select').pqSelect({
    						 checkbox: true,
    						 search: true,
    						 width: getSelectBoxWidthCondition(ui)
	        			});
	        			 setTimeout(() => {
	        				 ui.$cell.find('select').pqSelect('open');
        				 }, 250);
        			},
					options: ui => {
						return window['meqlocList']?.map(e => {
							if(e.warekey === ui.rowData.warekey && e.areakey === ui.rowData.toareky && e.locakey === ui.rowData.tolocky){
								const obj = {};
								obj[e.equipky] = e.equinam;

								return obj;
							}
						}).filter(e=>e);
					}
				},
				editable: true,
				render: ui => {
					const target = window['meqlocList']?.find( e => e.warekey === ui.rowData.warekey && e.areakey === ui.rowData.toareky && e.locakey === ui.rowData.tolocky && e.equipky === ui.cellData);
					ui.rowData[ui.dataIndx] = target ? target.equipky : '';
					return {
						text: target ? target.equinam : ''
					};
				}
			},
			{ title: '[[#{sm.wstkky.tolayer}]]', dataType: 'integer', dataIndx: 'tolayer',
				styleHead: { 'background-color':'[[#{grid.styleHead02}]]' }
			},
			{ title: '[[#{sm.wstkky.parsncd}]]', dataType: 'string', dataIndx: 'parsncd',
				styleHead: { 'background-color':'[[#{grid.styleHead01}]]' },
				editor: {
					type: 'select',
		            init: function (ui) {
		            	ui.$cell.find('select').pqSelect({ checkbox : true });
		                setTimeout(function () {
		                	ui.$cell.find('select').pqSelect('open');
			        	}, 250);
					},
				    options: ui => {
				    	return window['rsncodeRelationList']?.map(e => {
							if(e.warekey === ui.rowData.warekey && e.doccate === '500' && e.doctype === '510'){
								const obj = {};
								obj[e.rsncode] = e.rsncdnm;

								return obj;
							}
						}).filter(e => e);
				    }
				},
				render : ui =>{
					const target = window['rsncodeRelationList']?.find( e => e.warekey === ui.rowData.warekey && e.doccate === '500' && e.doctype === '510' && e.rsncode === ui.cellData);
					return {
						text : target ? target.rsncdnm : ''
					}
				},
				editable: true
			},
			{ title: '[[#{sm.wstkky.parsnnm}]]', dataType: 'string', dataIndx: 'parsnnm',
				styleHead: { 'background-color':'[[#{grid.styleHead02}]]' }, editable: true
			},
			{ title: '[[#{grid.btrcate}]]', dataType: 'string', dataIndx: 'btrcate', editable: false, hidden : true },
			{ title: '[[#{grid.btrcnam}]]', dataType: 'string', dataIndx: 'btrcnam', editable: false },
			{ title: '[[#{bm.baddco.addcoky}]]', dataType: 'string', dataIndx: 'addcoky', editable: false, hidden : true},
			{ title: '[[#{bm.baddco.addconm}]]', dataType: 'string', dataIndx: 'addconm', editable: false },
			{ title: '[[#{grid.skugrky}]]', dataType: 'string', dataIndx: 'skugrky', editable: false, hidden : true},
			{ title: '[[#{grid.grpkynm}]]', dataType: 'string', dataIndx: 'grpkynm', editable: false},

			// 제품번호
			{
				title: '[[#{sm.wstkky.skumkey}]]',
				dataType: 'string',
				dataIndx: 'skumkey',
				editable: false,
				render: function (ui) {
				    if (ui.rowData.taskqty != 0) {
				      return {
				        text: ui.cellData,
				        style: 'color: #ff0066; font-weight: bold;'		// 선별지시등록 한 것은 '빨간색'으로 표시
				      };
				    } else {
				      return { text: ui.cellData };
				    }
				  }
			},

			{ title: '[[#{sm.wstkky.skuthic}]]', dataType: 'double', dataIndx: 'skuthic', format: '#,###.000', editable: false, summary: { type : 'max' } },
			{ title: '[[#{sm.wstkky.skuwidt}]]', dataType: 'double', dataIndx: 'skuwidt', format: '#,###.0', editable: false, summary: { type : 'max' } },
			{ title: '[[#{sm.wstkky.skuleng}]]', dataType: 'integer', dataIndx: 'skuleng', format: '#,###', editable: false, summary: { type : 'max' } },
			{ title: '[[#{sm.wstkky.skuweig}]]', dataType: 'integer', dataIndx: 'skuweig', format: '#,###', editable: false, summary: { type : 'sum' } },
			{ title: '[[#{sm.wstkky.ownerky}]]', dataType: 'string', dataIndx: 'ownerky', editable: false, hidden: true }, // hidden 처리
			{ title: '[[#{sm.wstkky.ownrnam}]]', dataType: 'string', dataIndx: 'ownrnam', editable: false },
			{ title: '[[#{sm.wstkky.custkey}]]', dataType: 'string', dataIndx: 'custcod', editable: false, hidden: true }, // hidden 처리
			{ title: '[[#{sm.wstkky.custnam}]]', dataType: 'string', dataIndx: 'custnam', editable: false},
			{ title: '[[#{sm.wstkky.regiorg}]]', dataType: 'string', dataIndx: 'regiorg', editable: false},
			{ title: '[[#{sm.wstkky.renamlc}]]', dataType: 'string', dataIndx: 'renamlc', editable: false },
			{ title: '[[#{sm.wstkky.regimod}]]', dataType: 'string', dataIndx: 'regimod', editable: false},
			{ title: '[[#{sm.wstkky.remodnm}]]', dataType: 'string', dataIndx: 'remodnm', editable: false },
			{ title: '[[#{sm.wstkky.destorg}]]', dataType: 'string', dataIndx: 'destorg', editable: false, hidden: true }, // hidden 처리
			{ title: '[[#{sm.wstkky.deorgnm}]]', dataType: 'string', dataIndx: 'deorgnm', editable: false },
			{ title: '[[#{sm.wstkky.destmod}]]', dataType: 'string', dataIndx: 'destmod', editable: false, hidden: true }, // hidden 처리
			{ title: '[[#{sm.wstkky.demodnm}]]', dataType: 'string', dataIndx: 'demodnm', editable: false },
			{ title: '[[#{sm.wstkky.purcnum}]]', dataType: 'string', dataIndx: 'purcnum', editable: false },
			{ title: '[[#{sm.wstkky.orderln}]]', dataType: 'string', dataIndx: 'orderln', editable: false },
			{ title: '[[#{sm.wstkky.lotnmky}]]', dataType: 'string', dataIndx: 'lotnmky', editable: false },
			{ title: '[[#{sm.wstkky.stlotnb}]]', dataType: 'string', dataIndx: 'stlotnb', editable: false },
			{ title: '[[#{sm.wstkky.skudesc}]]', dataType: 'string', dataIndx: 'skudesc', editable: false },
			{ title: '[[#{sm.wstkky.itemcod}]]', dataType: 'string', dataIndx: 'itemcod', editable: false },
			{ title: '[[#{grid.btrfstc}]]', dataType: 'string', dataIndx: 'btrfstc', editable: false },
			{ title: '[[#{sm.wstkky.stotqty}]]', dataType: 'integer', dataIndx: 'stotqty', editable: false, summary: { type : 'sum' } },
			{ title: '[[#{sm.wstkky.taskqty}]]', dataType: 'integer', dataIndx: 'taskqty', editable: false, summary: { type : 'sum' } },
			{ title: '[[#{sm.wstkky.sallqty}]]', dataType: 'integer', dataIndx: 'sallqty', editable: false, summary: { type : 'sum' } },
			{ title: '[[#{sm.wstkky.sbloqty}]]', dataType: 'integer', dataIndx: 'sbloqty', editable: false, summary: { type : 'sum' }},
			{ title: '[[#{sm.wstkky.planqty}]]', dataType: 'integer', dataIndx: 'planqty', editable: false, summary: { type : 'sum' } },
			{ title: '[[#{sm.wstkky.plcmqty}]]', dataType: 'integer', dataIndx: 'plcmqty', editable: false, summary: { type : 'sum' } },
			{ title: '[[#{sm.wstkky.suomkey}]]', dataType: 'string', dataIndx: 'suomkey', editable: false },
			{ title: '[[#{sm.wstkky.rcvdcdt}]]', dataType: 'string', dataIndx: 'rcvdcdt', editable: false },
			{ title: '[[#{sm.wstkky.lotat01}]]', dataType: 'string', dataIndx: 'lotat01', editable: false },
			{ title: '[[#{sm.wstkky.lotat02}]]', dataType: 'string', dataIndx: 'lotat02', editable: false },
			{ title: '[[#{sm.wstkky.lotat03}]]', dataType: 'string', dataIndx: 'lotat03', editable: false },
			{ title: '[[#{sm.wstkky.stkstat}]]', dataType: 'string', dataIndx: 'stkstat', editable: false, hidden: true },

		async function saveEachdoedy035(){
			const grid = pq.grid('#doedy035Grid');
			const gridDataList 	= grid.getData();

			const checkList = gridDataList.filter(function(e) {
				return e.state === 'Y';
			});

			if(!checkList.length){
				alert('[[#{ms.choiceRowZero}]]');
				return;
			}

			//선별지시 대상위 재고가 있는지 검증
			const isStockCheckPassed = await validateStockForSelection(checkList);

			if(!isStockCheckPassed){
				return;
			}

			const validation = validateEssentialFieldBeforeSaveGridUtil(doedy035GridObject, ['toareky', 'tolocky', 'equipky', 'parsncd']);
			if(!validation){
				return;
			}

			checkList.sort((a, b) => {
			    if (a.tolocky > b.tolocky) return 1;
			    if (a.tolocky < b.tolocky) return -1;
			    return a.tolayer - b.tolayer;
			});

			if(confirm('[[#{ms.checksave}]]')) {
				grid.showLoading();

				const rData = await fetchUtil('POST','/sm/inventory/doe035/save', {updateList : checkList});

				if(rData.status === 200){
					makeEmptyGrid(grid);
					grid.refreshDataAndView();
					resetSkuCountHtml();
				}

				grid.hideLoading();
			}
		}
		//선별지시 대상위 재고가 있는지 검증 true : 선별지시 가능, false : 선별지시 불가능
		//A01베드에서 3,5,6단 제품을 선택시 3,6만 param에 담긴다. (연속된 단은 최대단)
		async function validateStockForSelection(gridCheckList){
			const validateParam = [];
			const param = {};

			gridCheckList.forEach(row =>{
				const key = row.areakey + '-' + row.locakey;
				if(!param[key]){
					param[key] = [];
				}
				param[key].push(row);
			});

			Object.values(param).forEach(rows=>{
				rows.sort((a,b)=> b.lolayer - a.lolayer);

				let lastLolayer = null;
				const lolayerList = [];
				rows.forEach(currentRow=>{
					const currentLolayer = currentRow.lolayer;

					//처음이거나, 연속적이지 않을떄
					if(lastLolayer === null || currentLolayer !== lastLolayer - 1){
						if(lastLolayer !== null){
							lolayerList.push(currentLolayer);
							lolayerList.push(lastLolayer);
						}
						currentRow['lolayerList'] = [...lolayerList];
						validateParam.push(currentRow);
					}

					lastLolayer = currentRow.lolayer;

				});
			});
			const response = await fetchUtil('POST', '/sm/inventory/doe035/validate', validateParam);

			return response.status === 200;
		}

		//선별 장소모달 To창고동 체인지 이벤트(pqselect 제이쿼리 기반)
		$('#doedy035ModalAreakey').change(function(event){
			const locakeyFilter = locakeyList.filter(function(data){
				return data.warekey === document.querySelector('#doedy035Warekey').value && data.areakey === event.target.value && data.loctype === 'BED';
			});

			setSelectboxOption('doedy035ModalLocakey',locakeyFilter, 'loc');
			setSelectboxOption('doedy035ModalEquipky',[], 'equ');

			document.querySelector('#doedy035ModalLayerFrom').value = '';
			document.querySelector('#doedy035ModalLayerTo').value = ''
		});

		//선별 장소모달 To베드 체인지 이벤트(pqselect 제이쿼리 기반)
		$('#doedy035ModalLocakey').change(async function(event){
			// To베드의 현 최대단 +1 ~ (현 최대단 +1) + 체크노드
			const grid = pq.grid('#doedy035Grid');
			const gridDataList 	= grid.getData();

			const checkList = gridDataList.filter(function(e) {
				return e.state === 'Y';
			});

			const param = {
				warekey : document.querySelector('#doedy035Warekey').value,
				areakey : document.querySelector('#doedy035ModalAreakey').value,
				locakey : document.querySelector('#doedy035ModalLocakey').value
			}

			const response = await fetchUtil('GET','/sm/inventory/doe035/layer',param);

			if(response.status === 200){
				const layerData = await response.json();
				document.querySelector('#doedy035ModalLayerFrom').value = (layerData.lolayer + 1);
				document.querySelector('#doedy035ModalLayerTo').value = layerData.lolayer + checkList.length;

				const equikyFilter = window.meqlocList.filter(e => e.warekey === document.querySelector('#doedy035Warekey').value && e.locakey === event.target.value);
				setSelectboxOption('doedy035ModalEquipky',equikyFilter, 'equ');

			}
		});

		async function setSelectboxOption(objectId, optionList, objType){

			const selectId = document.querySelector('#'+objectId);

			let html = '<option value="">[[#{ms.select}]]</option>';
			for (let i = 0; i < optionList.length; i++) {
				const optionData = optionList[i];
				let optionValue;
				let optionName;
				if(objType === 'are'){
					optionValue = optionData.areakey;
					optionName = optionData.areanam;
				}else if(objType === 'loc'){
					optionValue = optionData.locakey;
					optionName = optionData.locanam;
				}else if(objType === 'equ'){
					optionValue = optionData.equipky;
					optionName = optionData.equinam;
				}else if(objType === 'pars'){
					optionValue = optionData.combovl;
					optionName = optionData.combonm;
				}

				const isSelected = objectId === 'doedy035ModalParsncd' && i === 0 ? ' selected' : '';
				html += '<option value="' + optionValue + '"' + isSelected + '>' + optionName + '</option>';
			}
			selectId.innerHTML = html;

			$('#' + objectId).pqSelect('refreshData');
		}

		//모달 X 버튼 및 취소 버튼
		document.querySelector('#doedy035LocationMdClose').addEventListener('click', function() {
			modalHide();
		});
		document.querySelector('#doedy035LocationMdCancel').addEventListener('click', function() {
			modalHide();
		});

		//모달 닫기 이벤트
		function modalHide() {
			document.querySelectorAll('.modal-body select[id*="doedy035"]').forEach(function(select) {

				if(select.id === 'doedy035ModalLocakey' || select.id === 'doedy035ModalParsnnm' || select.id === 'doedy035ModalEquipky'){
					select.innerHTML = '';
				}else{
					select.options[0].selected = true;
				}
				$('#' + select.id).pqSelect('refreshData');
			});

			document.querySelectorAll('.modal-body input[id*="doedy035"]').forEach(function(element) {
				element.value = '';
			});

			locationModal.hide();
			document.activeElement.blur()
		}

		document.querySelector('#doedy035LocationMdSave').addEventListener('click', function(){
			savedoedy035();
		});

		async function savedoedy035(){
			const grid = pq.grid('#doedy035Grid');

			const params = grid.Checkbox('state').getCheckedNodes();

			if(!await modalValidate()){
				return;
			}

			params.forEach(function(item){
					item.toareky = document.querySelector('#doedy035ModalAreakey').value;
					item.tolocky = document.querySelector('#doedy035ModalLocakey').value;
					item.equipky = document.querySelector('#doedy035ModalEquipky').value;
					item.parsncd = document.querySelector('#doedy035ModalParsncd').value;
					item.parsnnm = document.querySelector('#doedy035ModalParsnnm').value;
			});

			if(confirm('[[#{ms.checksave}]]')) {
				grid.showLoading();

				const rData = await fetchUtil('POST','/sm/inventory/doe035/save', {updateList : params});

				if(rData.status === 200){
					makeEmptyGrid(doedy035GridObject.getGrid());
					grid.refreshDataAndView();
					resetSkuCountHtml();
					modalHide();
				}

				grid.hideLoading();
			}
		}

		async function modalValidate(){
			 const requiredFields = document.querySelectorAll('select[id*="doedy035Modal"]');

			 for(const requiredField of requiredFields){
				 if(!requiredField.value){
					const labelElement = document.querySelector('label[for="' + requiredField.id + '"]');

					alert(labelElement.textContent + ' [[#{ms.requiredValue}]]');
					$('#' + requiredField.id).pqSelect('open');

					return false;
				 }
			 }
			 return true;
		}

		//keyup
		doedy035KeyupEvt = async function (){
			const key = this.event.key || this.event.keyCode;
			if(key === 'Enter' || key === 13) {
				await getdoedy035List();
			}
		}

		// 창고 변경시 자동조회
		document.querySelector('#doedy035Warekey').addEventListener('change', async function() {
			const areakeyFilter = areakeyList.filter(e=>{
				return e.warekey === document.querySelector('#doedy035Warekey').value;
			});
			makeOptionAreakey(areakeyFilter);
			const locakeyFilter = locakeyList.filter(e=> e.warekey === document.querySelector('#doedy035Warekey').value && (e.loctype === 'BED' || e.loctype === 'TMP'));
			makeOptionLocakey(locakeyFilter);
			const grid = pq.grid('#doedy035Grid');
			if(doedy035CurrentWarekey && grid.pdata.length > 0){
				if (!confirm('[[#{ms.listViewRollback}]]')) {
					this.value = doedy035CurrentWarekey;
					return;
				}
			}
			await getdoedy035List();
		});
	}();
	</script>
</div>
</html>
