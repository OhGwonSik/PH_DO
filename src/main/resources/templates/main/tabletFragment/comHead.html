	<!-- Context Path -->
	<script th:inline="javascript">
	    function getTokenValue(item){
		    	const token = localStorage.getItem('accessToken')?.replace('Bearer ', '');
	 		const base64Payload = token?.split('.')[1];
	 		const base64 = base64Payload?.replace(/-/g, '+').replace(/_/g, '/');

	 		return JSON.parse(
			      decodeURIComponent(
			        window.atob(base64)
					          .split('')
					          .map(function (c) {
					            return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
					          })
			        		  .join('')
				)
	 		);
	    }
 		const rPath = document.querySelector('#rPath').getAttribute('data-contextPath') || '';
 		const userAttr = getTokenValue('accessToken');
 		const mainHeader = /*[[${mainHeader}]]*/'';
 		const userMenu = /*[[${userMenu}]]*/'';
 		const pagePath = /*[[${pagePath}]]*/'';
 		window.ggActivPG = 'Home';
 		sessionStorage.activeProgramList = JSON.stringify(mainHeader);
	</script>
