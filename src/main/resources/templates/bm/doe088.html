<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{/main/fragment/defaultLayout}">
<div class="tab-contents" layout:fragment="content">
	<div class="location"></div>
	<div class="search-conditions con-box">
		<div class="setting-grid" th:data-visible-target='${tabPage}'>
			<label for="doe088Warekey" class="setting-grid-title ic-title-nece">[[#{search.whnamlc}]]</label>
			<div class="setting-grid-content">
				<div class="input-group">
					<select id="doe088Warekey" name="doe088Warekey"
						data-cb-val="combovl" data-cb-name="combonm"
						data-cb-url="/md/organization/warehouse" data-cb-select=""
						data-cb-variable="warekeyList">
					</select>
				</div>
			</div>
			<label for="doe088Btrcate" class="setting-grid-title">[[#{bm.btrpma.btrcate}]]</label>
			<div class="setting-grid-content">
				<div class="input-group">
					<select id="doe088Btrcate" name="doe088Btrcate"
						data-cb-val="btrcate" data-cb-name="btrcnam"
						data-cb-url="/bm/billing/doe079/btrcat" data-cb-select=""
						data-cb-variable="btrcatList">
						<option value="">[[#{ms.chooseAll}]]</option>
					</select>
				</div>
			</div>
			<label class="setting-grid-title ic-title-nece">[[#{bm.btrfhd.fccdate}]]</label>
			<div class="setting-grid-content">
				<div class="input-date-group">
					<input type="date" max="2999-12-31" id="doe088ConfirmdateFrom"
						onkeyup="setInputDateDel(this)" name="doe088Confirmdate" /> <span>~</span>
					<input type="date" max="2999-12-31" id="doe088ConfirmdateTo"
						onkeyup="setInputDateDel(this)" name="doe088Confirmdate" />
				</div>
			</div>
			<label for="doe088Btrpitc" class="setting-grid-title">[[#{bm.btrpma.btrpitc}]]</label>
			<div class="setting-grid-content">
				<div class="input-group">
					<select id="doe088Itemcod" name="doe088Itemcod"
						data-cb-val="comcdvl" data-cb-name="comcdvl"
						data-cb-url="/md/doe014/grid?comcdky=itemcod" data-cb-select=""
						data-cb-variable="itemcodList">
						<option value="">[[#{ms.chooseAll}]]</option>
					</select>
				</div>
			</div>
			<label for="doe088Btrfcbt" class="setting-grid-title">[[#{bm.btrfit.btrfcbt}]]</label>
			<div class="setting-grid-content">
				<div class="input-group">
					<select id="doe088Btrfcbt" name="doe088Btrfcbt">
						<option value="">[[#{ms.chooseAll}]]</option>
					</select>
				</div>
			</div>
			<label for="doe088Btrfpat" class="setting-grid-title">[[#{bm.btrfit.btrfpat}]]</label>
			<div class="setting-grid-content">
				<div class="input-group">
					<select id="doe088Btrfpat" name="doe088Btrfpat"
						data-cb-val="combovl" data-cb-name="combonm"
						data-cb-url="/md/partner/vehicle" data-cb-select=""
						data-cb-variable="vehickyList">
						<option value="">[[#{ms.chooseAll}]]</option>
					</select>
				</div>
			</div>
			<label for="doe088Sbillto" class="setting-grid-title">[[#{bm.btrfit.sbillto}]]</label>
			<div class="setting-grid-content">
				<div class="input-group">
					<select id="doe088Sbillto" name="doe088Sbillto">
						<option value="">[[#{ms.chooseAll}]]</option>
					</select>
				</div>
			</div>
			<label for="doe088Skumkey" class="setting-grid-title">[[#{search.skuCode}]]</label>
			<div class="setting-grid-content">
				<div class="input-wrapper">
					<input type="text" id="doe088Skumkey" name="doe088Skumkey" onkeyup="doe088SearchKeyup()"
						th:placeholder="${#messages.msg('search.skuCode')}" >
				</div>
			</div>
			<label for="doe088Addsiky" class="setting-grid-title">[[#{bm.baddco.addconm}]]</label>
				<div class="setting-grid-content">
					<div class="input-group">
						<select id="doe088Addsiky" name="doe088Addsiky" 
						data-cb-val="combovl" data-cb-name="combonm" data-cb-url="/md/code/common-code?comcdky=addsiky" 
						data-cb-select="" data-cb-variable="addsikyList">
							<option value="">[[#{ms.chooseAll}]]</option>
						</select>
					</div>
				</div>
		</div>
		<div class="search-btn-group">
			<button type="button" class="btn-search btn-navy btn-green"
				id="doe088BtnSearch">
				<img alt="">[[#{bt.search}]]
			</button>
			<button type="button" class="btn-clear btn-white" id="doe088BtnReset">
				<img alt="">[[#{bt.reset}]]
			</button>
		</div>
	</div>
	<div class="search-list">
		<div class="list-top" th:data-visible-target='${tabPage}'>
			<div class="list-title ic-title-mark">
				<span>[[#{menu.bm.doe088}]]</span>
			</div>
			<div class="edit-btn-wrapper">
				<button class="btn-navy btn-green" id="doe088BtnBilling">
					<img class="ic-bt-save" alt="">[[#{bm.bt.billStatement}]]
				</button>
				<button class="btn-navy btn-green" id="doe088BtnPayment">
					<img class="ic-bt-save" alt="">[[#{bm.bt.payStatement}]]
				</button>
				<button class="btn-white btn-green" id="doe088BillSummary">
					<img class="ic-bt-save" alt="">실적집계
				</button>
			</div>
		</div>
		<ul class="nav nav-tabs" id="doe088GridTab">
			<li class="nav-item"><a class="nav-link active doe088"
				data-toggle="tab" data-tab-type="before" href="#doe088BeforeClose" id="doe088BeforeTab">[[#{bm.common.transfer}]]</a>
			</li>
			<li class="nav-item"><a class="nav-link doe088"
				data-toggle="tab" data-tab-type="after" href="#doe088AfterClose" id="doe088AfterTab">[[#{bm.common.transport}]]</a>
			</li>
		</ul>
		<div class="tab-content">
			<div class="list-grid-wrapper con-box tab-pane show active" id="doe088BeforeClose">
				<div class="search-list">
					<div class="grid-container">
						<div id="doe088BeforeGrid"></div>
					</div>
				</div>
			</div>
			<div class="list-grid-wrapper con-box tab-pane active" id="doe088AfterClose">
				<div class="search-list">
					<div class="grid-container">
						<div id="doe088AfterGrid"></div>
					</div>
				</div>
			</div>
		</div>
		<!-- 로딩 이미지 -->
		<div class="spinner" id="spinner">
		</div>
	</div>
	<!-- 청구 명세서 모달 -->
	<div class="modal fade modalTm" id="doe088BillStatementModal" role="dialog" aria-labelledby="doe088BillStatementModal" aria-hidden="true">
		<div class="modal-dialog" role="document">
			<div class="modal-content popup-register modal-con" style="top:120px; display:flex;">
				<div class="modal-top">
					<h5 class="box-title" id="doe088BillStatement">[[#{bm.bt.billStatement}]]</h5>
				</div>
				<div class="modal-body">
					<div class="setting-grid">
						<label for="doe088CustkeyMd" class="setting-grid-title">[[#{search.cunamlc}]]</label>
						<div class="setting-grid-content">
							<div class="input-group">
								<select id="doe088CustkeyMd">
									<option value="">[[#{ms.chooseAll}]]</option>
								</select>
							</div>
						</div>
						<label for="doe088BtrfcbtMd" class="setting-grid-title">청구 대상</label>
						<div class="setting-grid-content">
							<div class="radio-group" id="doe088BillRadio">
								<input type="radio" id="doe088BtrfcbtMd" name="doe088BillRadio" value="btrfcbt" checked="checked">
								<label for="doe088BtrfcbtMd">[[#{bm.btrfit.btrfcbt}]]</label>
								<input type="radio" id="doe088SbilltoMd" name="doe088BillRadio" value="sbillto">
								<label for="doe088SbilltoMd">[[#{bm.btrfit.sbillto}]]</label>
							</div>
						</div>
					</div>
				</div>
				<div class="modal-bottom">
					<button class="btn-white" id="doe088BillStatementMdSave">확인</button>
					<button class="btn-white" id="doe088BillStatementMdClose">[[#{bt.close}]]</button>
				</div>
			</div>
		</div>
	</div>
	<!-- 실적집계 모달 -->
	<div class="modal fade modalTm" id="doe088BillSummaryModal" tabindex="-1" role="dialog" aria-labelledby="doe088VerifySummaryModal" aria-hidden="true">
		<div class="modal-dialog modal-xl" role="document">
			<div class="modal-content">
				<div class="modal-top">
					<h5 class="box-title" id="doe088BillDaySummarTitle">실적집계</h5>
				</div>
				<div class="modal-body">
					<div class="search-list">
						<div class="list-top">
							<div class="list-title ic-title-mark">
								<span>일별집계</span>
							</div>
							<div class="edit-btn-wrapper">
								<span>※마감 전 정산금이 포함된 집계 내역입니다.</span>
							</div>
						</div>
						<div class="list-grid-wrapper con-box">
							<div id="doe088DayBillSummaryGrid"></div>
						</div>
						<div class="list-top">
							<div class="list-title ic-title-mark">
								<span id="doe088Month"></span><span>월 누적집계</span>
							</div>
						</div>
						<div class="list-grid-wrapper con-box">
							<div id="doe088MonthBillSummaryGrid"></div>
						</div>
					</div>
				</div>
				<div class="modal-bottom">
					<button class="btn-white" id="doe088BillSummaryMdClose">[[#{bt.close}]]</button>
				</div>
			</div>
		</div>
	</div>
<script>
!async function(){

	const pageId = `[[${tabPage}]]`;

	const billStatementModalId = document.getElementById(pageId + 'BillStatementModal');
	//모달 키보드와 마우스로 안닫히게끔 설정
	const billStatementModal = new bootstrap.Modal(billStatementModalId, {
		backdrop: 'static',
		keyboard : false
	});
	
	const billSummaryModalId = document.getElementById(pageId + 'BillSummaryModal');
	//모달 키보드와 마우스로 안닫히게끔 설정
	const billSummaryModal = new bootstrap.Modal(billSummaryModalId, {
		backdrop: 'static',
		keyboard : false
	});

	document.querySelector('#doe088BillStatementMdClose').addEventListener('click', function() {
		billStatementModal.hide();
		document.activeElement.blur();
		document.querySelector('#doe088CustkeyMd').selectedIndex = 0;
		document.querySelectorAll('#doe088BillRadio input[type="radio"]').forEach(function(radio) {
		    if (radio.value !== 'btrfcbt') {
				return;
		    }
		    radio.checked = true;
		});
		$('#doe088CustkeyMd').pqSelect('refreshData');
	});

	document.querySelectorAll('.nav-item .nav-link').forEach(navLink => {
	    navLink.addEventListener('click', () => {
	    	 const targetElement = document.querySelector(`#tabli_${pageId}`);
	        // 특정 요소의 클래스가 .on 인지 확인

	        if (targetElement?.classList.contains('on')) {
	            // 선택된 탭을 상수로 저장
	            const clickedTab = navLink;
	            // 지연 없이 바로 클래스가 변경되었는지 확인
	            requestAnimationFrame(() => {
	                if (clickedTab.classList.contains('active') && clickedTab.classList.contains('show')) {
	                	const initTabType = clickedTab.getAttribute('data-tab-type');
	    	            if(initTabType === 'after') {
		    	            doe088AfterGridObject.getGrid().refresh();
		    	            return;
	    	            }
	    	            doe088BeforeGridObject.getGrid().refresh();
	                }
	            });
	        }
	    });
	});
	
	//날짜 From to 역전 불가
	dateValidation(document.querySelector('#' + pageId + 'ConfirmdateFrom'), document.querySelector('#' + pageId + 'ConfirmdateTo'),pageId +'Confirmdate',1,'M');
	
	//창고명 변경시 Head Grid, Item Grid empty 
	document.querySelector('#doe088Warekey').addEventListener('change', () => {
		getDoe088SearchList();
	});
	
	//조회 버튼 클릭
	document.querySelector('#doe088BtnSearch').addEventListener('click', function(){
		getDoe088SearchList();
	});

	//검색영역 초기화 버튼
	document.querySelector('#doe088BtnReset').addEventListener('click', function(){
		const tabType = document.querySelector('.nav-item .nav-link.active[id*="' + pageId + '"]').getAttribute('data-tab-type');
		const gridObject = tabType === 'after' ? doe088AfterGridObject : doe088BeforeGridObject;
		makeEmptyGrid(gridObject);
		document.querySelectorAll(`input[id*="${pageId}"], select[id*="${pageId}"]`).forEach(function(el){
			if(el.localName === 'select'){
				el.selectedIndex = 0;
				if(el.className === 'pq-select'){	//고객명
					$('#' + el.id).pqSelect('refreshData');
					return;
				}
			}else {
				if(el.type === 'date' && el.name === 'doe088Confirmdate'){	//input			
					document.querySelector('#' + el.name + 'From').value = moment().subtract('1','M').format('YYYY-MM-DD');
					document.querySelector('#' + el.name + 'To').value = moment().format('YYYY-MM-DD');	//한달뒤 set
					return;
				}
				el.value = '';
			}
		});
	});

	document.querySelector('#doe088BtnBilling').addEventListener('click', function() {
		billStatementModal.show();
	});
	
	document.querySelector('#doe088BillSummary').addEventListener('click', function() {
		document.querySelector('#doe088Month').insertAdjacentText('afterbegin',moment().format('MM'));
		billSummaryModal.show();
	});
	
	//shown.bs.modal 시점에 grid open => javacript 미동작
	$('#doe088BillSummaryModal').on('shown.bs.modal', async function() {
		doe088DayModalGridObject.open();
		doe088MonthModalGridObject.open();
	});

	document.querySelector('#doe088BillSummaryMdClose').addEventListener('click', function() {
		document.querySelector('#doe088Month').textContent = '';
		billSummaryModal.hide();
		document.activeElement.blur();
	});
	
	$('#doe088BillSummaryModal').on('hidden.bs.modal', async function() { 
		doe088DayModalGridObject.getGrid().destroy();
		doe088MonthModalGridObject.getGrid().destroy();
	});

	//모달 켜지기 전에 pqSelect되면 디자인이 깨지기때문에 show된 후 세팅
	$('#doe088BillStatementModal').on('shown.bs.modal', function (event) {
    	$('#doe088CustkeyMd').pqSelect({ deselect : false });
    	$('#doe088CustkeyMd').pqSelect('refreshData');
    });

	/********** 청구명세서 출력 *************/
	document.querySelector('#doe088BillStatementMdSave').addEventListener('click', async function() {
		const tabType = document.querySelector('.nav-item .nav-link.active[id*="' + pageId + '"]').getAttribute('data-tab-type');
		const tabText = document.querySelector('.nav-item .nav-link.active[id*="' + pageId + '"]').innerText;
		const report = [];
		if(!document.querySelector('#doe088CustkeyMd :checked').value){
			alert('[[#{search.cunamlc}]][[#{bm.doe088.selectValue}]]');
			$('#doe088CustkeyMd').pqSelect('open');
			return;
		}

		const reportObj = {
				warekey : document.querySelector('#doe088Warekey :checked').value,
				confirmdatefrom : document.querySelector('#doe088ConfirmdateFrom').value.replace(/-/g,''),
				confirmdateto : document.querySelector('#doe088ConfirmdateTo').value.replace(/-/g,''),
				type : pageId + '_1'
		};
		//라디오버튼 값에 따라 key값이 btrfcbt or sbillto 동적으로 변경
		reportObj[document.querySelector('#doe088BillRadio input[name="doe088BillRadio"]:checked').value] = document.querySelector('#doe088CustkeyMd :checked').value;
		reportObj['doctype'] = tabType ==='after' ? '920' : '910';
		report.push(reportObj);
		
		if(!confirm(tabText +' [[#{bm.bt.billStatement}]][[#{bm.doe088.printConfirm}]]')){
			return;
		}

		await reportPrint(report, pageId + '/billing');
		//출력 status를 못받아오기때문에 iframe이 생성됐는지 확인 후 조회, iframe이 없단건 출력/조회 될 정보가 없단 뜻
		if(document.querySelector('iframe')){
			getDoe088SearchList();
		}
	});

	/********** 지급명세서 출력 *************/
	document.querySelector('#doe088BtnPayment').addEventListener('click', async function() {
		const tabType = document.querySelector('.nav-item .nav-link.active[id*="' + pageId + '"]').getAttribute('data-tab-type');
		const tabText = document.querySelector('.nav-item .nav-link.active[id*="' + pageId + '"]').innerText;
		$('#doe088Btrfcbt').pqSelect('refreshData');
		const report = [];

		if(!document.querySelector('#doe088Btrfpat :checked').value){
			alert('[[#{bm.btrfit.btrfpat}]][[#{bm.doe088.selectValue}]]');
			$('#doe088Btrfpat').pqSelect('open');
			return;
		}
		const reportObj = {
				vehicky : document.querySelector('#doe088Btrfpat :checked').value,
				warekey : document.querySelector('#doe088Warekey :checked').value,
				confirmdatefrom : document.querySelector('#doe088ConfirmdateFrom').value.replace(/-/g,''),
				confirmdateto : document.querySelector('#doe088ConfirmdateTo').value.replace(/-/g,''),
				type : pageId + '_2'
		};
		reportObj['doctype'] = tabType ==='after' ? '920' : '910';
		report.push(reportObj);
		if(!confirm(tabText +' [[#{bm.bt.payStatement}]][[#{bm.doe088.printConfirm}]]')){
			return;
		}

		await reportPrint(report, pageId + '/payment');
		getDoe088SearchList();
	});
	
	/********** 이송 tab grid *************/
	const doe088BeforeGridColModel = [
		{ title: 'rowkey', dataType: 'string', dataIndx: 'rowkey', editable: false, hidden:true },
		{ title: '[[#{grid.wareCode}]]', dataType: 'string', dataIndx: 'warekey', editable: false, hidden: true },
		{ title: '[[#{grid.whnamlc}]]', dataType: 'string', dataIndx: 'whnamlc', editable: false, summary: { type : 'max' }},
		{ title: '[[#{bm.btrfhd.bfhdkey}]]', dataType: 'string', dataIndx: 'bfhdkey', editable: false, hidden: true },
		{ title: '[[#{tm.common.vhcfnam}]]', dataType: 'string', dataIndx: 'vhcfnam', editable: false },
		{ title: '[[#{bm.btrfit.bfhdcit}]]', dataType: 'integer', dataIndx: 'bfhdcit', editable: false, summary: { type : 'count' }},
		{ title: '[[#{bm.btrfhd.fccdate}]]', dataType: 'string', dataIndx: 'fccdate', editable: false },
		{ title: '[[#{bm.btrfhd.fcctime}]]', dataType: 'string', dataIndx: 'fcctime', editable: false , hidden: true},
		{ title: '[[#{bm.btrfhd.fccuser}]]', dataType: 'string', dataIndx: 'fccuser', editable: false , hidden: true},
		{ title: '[[#{bm.btrfit.doccate}]]', dataType: 'string', dataIndx: 'doccate', editable: false, hidden: true },
		{ title: '[[#{bm.btrfit.doccate}]]', dataType: 'string', dataIndx: 'docctnm', editable: false , hidden: true},
		{ title: '[[#{bm.btrfit.doctype}]]', dataType: 'string', dataIndx: 'doctype', editable: false, hidden: true },
		{ title: '[[#{bm.btrfit.doctype}]]', dataType: 'string', dataIndx: 'doctynm', editable: false },
		{ title: '[[#{bm.btrfit.btrcate}]]', dataType: 'string', dataIndx: 'btrcnam', editable: false },
		{ title: '[[#{bm.doe082.skumkey}]]', dataType: 'string', dataIndx: 'skumkey', editable: false, summary: { type : 'count' }},
		{ title: '[[#{bm.doe082.skuthic}]]', dataType: 'float', dataIndx: 'skuthic', editable: false, format: "#,###.000", summary : { type : 'max' }},
		{ title: '[[#{bm.btrfit.skuleng}]]', dataType: 'integer', dataIndx: 'skuleng', editable: false, format: "#,###", summary : { type : 'max' }},
		{ title: '[[#{bm.btrfit.skuwidt}]]', dataType: 'float', dataIndx: 'skuwidt', editable: false, format: "#,###.0", summary : { type : 'max' }},
		{ title: '[[#{bm.btrfit.skuweig}]]', dataType: 'integer', dataIndx: 'skuweig', editable: false, format: "#,###", summary : { type : 'sum' }},
		{ title: '[[#{bm.doe082.grossln}]]', dataType: 'integer', dataIndx: 'grossln', editable: false, format: "#,###", summary : { type : 'max' }},
		{ title: '[[#{bm.doe082.grosswd}]]', dataType: 'float', dataIndx: 'grosswd', editable: false, format: "#,###.0", summary : { type : 'max' }},
		{ title: '[[#{bm.doe082.grosswg}]]', dataType: 'integer', dataIndx: 'grosswg', editable: false, format: "#,###", summary : { type : 'sum' }},
		{ title: '[[#{bm.doe086.adcoper}]]', dataType: 'string', dataIndx: 'adcoper', editable: false},
		{ title: '[[#{bm.doe086.addcnam}]]', dataType: 'string', dataIndx: 'adconam', editable: false},
		{ title: '[[#{bm.btrfit.addcoky}]]', dataType: 'string', dataIndx: 'addcoky', editable: false, hidden: true },
		{ title: '[[#{bm.doe085.custkey}]]', dataType: 'string', dataIndx: 'custcod', editable: false ,hidden :true},
		{ title: '[[#{bm.common.cunamlc}]]', dataType: 'string', dataIndx: 'custnam', editable: false },

	//Search func
	async function getDoe088SearchList() {
		const params = makeSearchData(pageId);
		
		//목적지 셀박 두개 이상 선택시
		if(params.skumkey.trim() !== ''){
			if(params.skumkey.split(' ').length > 1){
				params['skumkeyList'] = [];
				for(const skumkey of params.skumkey.split(' ')){
					params['skumkeyList'].push(skumkey);
				}
				delete params['skumkey'];	//skumkeyList 가 들었을땐 skumkey 요소 삭제
			}
		}
		
		//명세서 출력시 조회 param을 위함
		if(document.querySelector('#doe088BillStatementModal').classList.contains('show')){
			params[document.querySelector('#doe088BillRadio :checked').value] =  document.querySelector('#doe088CustkeyMd :checked').value;
		}
		let grid;
		let url;

		const tabType = document.querySelector('.nav-item .nav-link.active[id*="' + pageId + '"]').getAttribute('data-tab-type');
		if(tabType === 'after'){
			grid = pq.grid('#doe088AfterGrid');
			url = '/bm/billing/doe088/grid/after';
		}else{
			grid = pq.grid('#doe088BeforeGrid');
			url = '/bm/billing/doe088/grid/before';
		}

		grid.showLoading();
		const rData = await fetchUtil('GET', url ,params);
		if(rData.status === 200){
			const dataList = await rData.json();
			grid.option('dataModel', { data: dataList, recIndx: 'rowkey' });
		}
		grid.refreshDataAndView();
		grid.hideLoading();
	}
	
	async function getModalBillSummaryList(params,grid){
		grid.showLoading();
		const rData = await fetchUtil('GET','/bm/billing/doe088/grid/modal',params);
		const SummaryList = await rData.json();
		if(rData.status === 200){
			grid.option('dataModel', { data: SummaryList, recIndx: 'rowkey' });
		}
		grid.hideLoading();
		grid.refreshDataAndView();
	}
	
	doe088SearchKeyup = async function (){

		if(key === 'Enter' || key === 13) {
