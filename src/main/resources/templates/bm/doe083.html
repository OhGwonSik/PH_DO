				deadFreightObject.trfdfpa = (deadFreightObject.trfdfwg * updateData.rowData.dfstdpa) / 1000;																						//부적지급 = 상기동일
				deadFreightObject.tosurch = updateData.rowData.tosurch;

				deadFreightObject.totpaco = deadFreightObject.toorgpa + updateData.rowData.tosurpa;	
					
				this.updateRow({

	doe083AfterHeadGridObj.setCheck(async function(event, ui){ 
		let result;
		if(doe083AfterItemGridObj.getGrid().getData().length === 0){
			result = await doe083AfterHeadGridObj.rowDblClick(event, ui);
		}else{
			let foundItem = doe083AfterItemGridObj.getGrid().getData().find(function(item) {
	            return item.bfhdkey === ui.rowData.bfhdkey;
	        });

	        // foundItem이 존재하지 않거나 bfhdkey가 일치하지 않으면 처리
	        if (!foundItem || foundItem.bfhdkey !== ui.rowData.bfhdkey) {
	        	result = await doe083AfterHeadGridObj.rowDblClick(event, ui);
	        }
		}
		
 		if(ui.dataIndx === 'state' || result === false) { 
 			ui.rowData.holidyn = result === false ? 'N' : ui.rowData.holidyn;
		}else if(ui.dataIndx === 'holidyn' && (ui.rowIndx !== null && ui.rowIndx !== undefined)) {
			let holichrOrg = ui.rowData.holchog;	//기존에 들고 있던 야간할증금액
			let holipayOrg = ui.rowData.holpaog;
			const rate = ui.check ? (ui.rowData.holrate / 100) : 0;
			const itemGridData = doe083AfterItemGridObj.getGrid().getData();
			for(const itemData of itemGridData) { 
				const standardWeight = itemData.calweig === 'GROSSWG' ? 'grosswg' : 'skuweig';
				doe083AfterItemGridObj.getGrid().updateRow({
					rowIndx: itemData.pq_ri,
					newRow: {
						state: 'Y',
						holichr: (itemData.btrfch1 * itemData[standardWeight] * rate) / 1000,
						holipay: (itemData.btrfpa1 * itemData[standardWeight] * rate) / 1000
					},
					history: false,
					checkEditable: false
				});
			}
			const newRow = {};
			newRow.holidyn = ui.check ? 'Y' : 'N';
			newRow.holichr = pq.aggregate.sum(itemGridData.map(item => item.holichr));
			newRow.holipay = pq.aggregate.sum(itemGridData.map(item => item.holipay));
			const toorgch = pq.aggregate.sum(itemGridData.map(item => item.totitch));
			const toorgpa = pq.aggregate.sum(itemGridData.map(item => item.totitpa));
			// 할증 적용여부 checkbox 컨트롤시 조금씩 금액이 빠짐
			// (1~ 10 정도) totitch / totitpa 데이터를 사용해보려고 했으나, 해당 데이터에는 야간할증금이 포함된 금액(마감시)이라 컨트롤 할 수 없음
			if(holichrOrg + holipayOrg > 0){
				newRow.toorgch = toorgch + ui.rowData.trfdfch - ui.rowData.holichr;
				newRow.toorgpa = toorgpa + ui.rowData.trfdfpa - ui.rowData.holipay;
			}else{
				newRow.toorgch = toorgch + ui.rowData.trfdfch + newRow.holichr;	//기본청구 = 청구금 + 할증금 + 부적금 		//기본청구 = 청구금 + 할증금 + 부적금
				newRow.toorgpa = toorgpa + ui.rowData.trfdfpa + newRow.holichr;
			}
			newRow.totchco = newRow.toorgch + ui.rowData.tosurch;
			newRow.totpaco = newRow.toorgpa + ui.rowData.tosurpa;
			this.updateRow({
				rowIndx: ui.rowIndx,
				newRow: newRow,
				checkEditable: false
			});
		}
		this.refresh();
	});
	
	doe083AfterHeadGridObj.setRowDblClick(async function(event,ui){
		if(ui.dataIndx === 'bfhmemo'){
			return;
		}
		// 헤더 그리드 참조
		const headGrid = pq.grid('#doe083AfterHeadGrid');
		const itemGrid = pq.grid('#doe083AfterItemGrid');
		let activeHeadGridData;
		
		//item grid에 데이터가 있을 경우 로우 더블클릭시 필수값 확인 필요
		if(itemGrid.getData().length >0){
			let foundItem = doe083AfterItemGridObj.getGrid().getData().find(function(item) {
	            return item.bfhdkey === ui.rowData.bfhdkey;
	        });

	        // foundItem이 존재하지 않거나 bfhdkey가 일치하지 않으면 처리
	        if (foundItem) {
	        	return;
	        }
			// headgrid state === 'y'인 데이터 => 해당 grid의 bfhdkey와 아이템 그리드의 bfhdkey가 다르다면 그 아이템 리스트의 필수값을 확인
			// 다른bfhdkey를 가진 헤더를 더블클릭 했을때 item 그리드의 데이터 필수값을 확인하기 위함
			activeHeadGridData = headGrid.getData()
				.find(e => e.state === 'Y' && itemGrid.getData().some(item => item.bfhdkey === e.bfhdkey));
			
			if(activeHeadGridData){
				if(!await requiredCheck(ui)){
					return false;
				}
			}
		}
		//아이템에 수정된 데이터가 있을 경우
		const itemUpdateList = itemGrid.getChanges({all:true}).updateList;  
		if(itemUpdateList.length > 0 && activeHeadGridData){
			if(!confirm('[[#{ms.modifiedDataReset}]]')){
				ui.rowData.state = 'N';
				headGrid.refresh();
				//초기화 취소
				return false;
			}
			
			//아이템 그리드의 bfhdkey와 헤드 그리드의 bfhdkey가 같은 rowData를 담아서 해당 rowData의 추가 청구/지급, 총 청구/지급 값을 rollback하기 위함
			const headGridData = headGrid.getData().find(e => itemUpdateList.some(item => item.bfhdkey === e.bfhdkey));
			// 추가 청구 및 지급 데이터의 합계 계산
			const addchcoData = pq.aggregate.sum(itemUpdateList.map(item => item.addchco));
			const addpacoData = pq.aggregate.sum(itemUpdateList.map(item => item.addpaco));
			const totchco = pq.aggregate.sum(itemUpdateList.map(item => item.totitch));
			const totpaco = pq.aggregate.sum(itemUpdateList.map(item => item.totitpa));
			const historyData = doe083AfterHeadGridObj.getGrid().History().records.find(e => headGridData.bfhdkey === e.updateList[0].rowData.bfhdkey).updateList[0]; 
			
			// 변경된 금액으로 헤더 데이터를 계산
			const headCostObj = {
					state: 'N', // 초기 상태 설정
			    	holidyn : historyData.oldRow.holidyn || historyData.newRow.holidyn,
			    	tosurch: (headGridData.tosurch ?? 0) - addchcoData, // 변경된 추가 청구 금액
			    	tosurpa: (headGridData.tosurpa ?? 0) - addpacoData, // 변경된 추가 지급 금액
			    	totchco: totchco + (headGridData.tosurch ?? 0) - addchcoData, // 변경된 총 추가 청구 금액
			    	totpaco: totpaco + (headGridData.tosurpa ?? 0) - addpacoData// 변경된 총 추가 지급 금액
			};
			
			// 헤더 그리드의 특정 행 업데이트
			headGrid.updateRow({
			    rowIndx: headGridData.pq_ri,
			    newRow: headCostObj,
			    history : false,
			    checkEditable: false
			});

			// 그리드 화면 갱신
			await doe083AfterHeadGridObj.getGrid().refreshDataAndView();
		}
		const params = {
				warekey : ui.rowData.warekey,
				bfhdkey : ui.rowData.bfhdkey
		};
		await getDoe083ItemList(params);
	});

				if (updateData.newRow.addchco !== updateData.oldRow.addchco) {

				    updateData.rowData.addchco = updateData.newRow.addchco ?? 0;

				    addpaco += ((updateData.newRow.addpaco ?? 0) - (updateData.oldRow.addpaco ?? 0));
				    updateData.rowData.addpaco = updateData.newRow.addpaco ?? 0;
				    updateFlag = true;

			if(updateFlag){
				const gridData = doe083AfterItemGridObj.getGrid().getData();

				const addpacoData = pq.aggregate.sum(gridData.map(item=>item.addpaco));

				// 따라서 위 for문에서 변경된 값으로 총 금액 계산
				let totchco = headGridList.totchco + addchco;

			if(rData.status === 200){
				await getDoe083SearchList();
				makeEmptyGrid(doe083AfterItemGridObj);
			}
			grid.refreshDataAndView();
			grid.hideLoading();
		}
	});
	
	//마감취소
	document.querySelector('#doe083BtnCloseCancel').addEventListener('click', async function(){
		//마감 후 데이터의 체크 리스트를 확인 후 마감 취소
		const grid = pq.grid('#doe083AfterHeadGrid');
		const params = makeSaveData(grid);
		
		if(!params){
			return;
		}
		if(confirm('[[#{ms.cancelConfirm}]]')){
			grid.showLoading();
			const rData = await fetchUtil('PATCH', '/bm/billing/doe083/cancel', params);
			if(rData.status === 200){
				getDoe083SearchList();
				makeEmptyGrid(pq.grid('#doe083AfterItemGrid'));
			}
			grid.hideLoading();
			grid.refreshDataAndView();
		}
	});
	
	//청구처 변경 저장
	document.querySelector('#doe083BtnBtrfcbtSave').addEventListener('click',async function(){
		const grid = pq.grid('#doe083BeforeGrid');
		const params = makeSaveData(grid);
		if(!params){
			return;
		}
		if(confirm('청구처만 수정됩니다. 저장하시겠습니까?')){
			grid.showLoading();
			const rData = await fetchUtil('PATCH', '/bm/billing/doe083/btrfcbt-save' ,params);
			if(rData.status === 200){
				await getDoe083SearchList();
			}
		}
		
		grid.refreshDataAndView();	
		grid.hideLoading();
	});
	
	//Search func
	async function getDoe083SearchList() {
		let params;
		let grid;
		let url;
		
		if(initTabType === 'after'){
			makeEmptyGrid(doe083AfterItemGridObj);
			params = makeSearchData(pageId);
			grid = pq.grid('#doe083AfterHeadGrid');
			url = '/bm/billing/doe083/grid/head';
		}else{
			params = makeSearchData(pageId);
			params.fcvrfyn = 'N';		//검증여부 N
			grid = pq.grid('#doe083BeforeGrid');
			url = '/bm/billing/doe083/grid/item';
		}
		
		grid.showLoading();
		const rData = await fetchUtil('GET', url ,params);
		if(rData.status === 200){
			const btrfData = await rData.json();
			if(btrfData){
				grid.option('dataModel', { data: btrfData, recIndx: 'rowkey' });
			}
		}
		grid.refreshDataAndView();	
		grid.hideLoading();
	}
	/* Item Grid 조회 */
	async function getDoe083ItemList(params){
		const grid = pq.grid('#doe083AfterItemGrid');
		if(!params){
			return;
		}
		grid.showLoading();
		const rData = await fetchUtil('GET', '/bm/billing/doe083/grid/item', params);
		if(rData.status === 200){
			const btrfCloseItemList = await rData.json();
			grid.option('dataModel', { data:btrfCloseItemList, recIndx : 'rowkey' });
		}
		
		grid.refreshDataAndView();
		grid.hideLoading();
	}

	async function requiredCheck(ui){
		const itemGridList = doe083AfterItemGridObj.getGrid().getData();
		if(itemGridList.length > 0){
			//itemgrid list가 있고, 해당list의 bfhdkey값이 리스트와 다르다면
			const checkList = itemGridList.filter(function(item){
				return (item.bfhdkey !== ui.rowData.bfhdkey);
			});
			if(checkList.length > 0){
				const requiredData = checkList.find(function(item){
					return item.btrfcbt === '' || item.btrfcbt === null;
				}); 
				//청구처 필수값 확인
				if(requiredData){
					alert('[[#{bm.btrfit.btrfcbt}]][[#{bm.doe088.selectValue}]]');
					doe083AfterItemGridObj.getGrid().editCell({ rowIndx : requiredData.pq_ri , dataIndx : 'btrfcbt' });
					ui.rowData.state = ui.rowData.state && ui.rowData.state === 'Y' ?  ui.rowData.state : 'N';
					doe083AfterHeadGridObj.getGrid().refresh();
					return false;
				}
			}
		}
		return true;
	}
	
	//keyup
	doe083SearchKeyup = async function (){
		const key = this.event.key || this.event.keyCode;
		if(key === 'Enter' || key === 13) {
			await getDoe083SearchList();
		}
	}
	
	/* 검생영역 동적 변경 Event */
	async function initSearchCondition(tabType){
		//tapType : data-tap-type (after,before)
		const targetDoms = document.querySelectorAll('.setting-grid[data-visible-target=' + pageId + '] [data-visible-category], .list-top[data-visible-target=' + pageId + '] [data-visible-category]');
		targetDoms.forEach(dom => {
			if(!JSON.parse(dom.dataset.visibleCategory).includes(tabType)){
				dom.setAttribute('hidden', 'hidden');
			} else {
				dom.removeAttribute('hidden');
			}
		});
	}
}();
</script>
</div>
</html>
